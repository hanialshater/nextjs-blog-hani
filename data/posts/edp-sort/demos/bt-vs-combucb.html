<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bradley-Terry vs combinatorial-UCB, top-k recovery</title>
<style>
:root{--bg:#0b1220;--card:#131c30;--card2:#1a2440;--fg:#e6edf3;--dim:#8b95a8;--faint:#5b6378;--accent:#4c8df6;--accent2:#2a4a7a;--good:#5fd2a3;--warn:#f0a058;--bad:#e16c6c;--gold:#f5c451;--purple:#c879f0;--border:#1f2a44;--code:#0e1626;--mono:ui-monospace,Menlo,Monaco,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",Inter,Roboto,sans-serif}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--fg)}
body{font-family:var(--sans);font-size:15px;line-height:1.5;padding:12px}
button{font-family:var(--mono);font-size:13px;background:var(--card2);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:7px 13px;cursor:pointer;transition:all .12s}
button:hover{background:var(--accent2);border-color:var(--accent)}
button.primary{background:var(--accent);color:#0b1220;border-color:var(--accent);font-weight:600}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 14px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:14px 0;font-family:var(--mono);font-size:13px}
.stat{background:var(--code);padding:9px 11px;border-radius:6px}
.stat .label{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:0.08em}
.stat .value{color:var(--fg);font-size:17px;margin-top:3px}
canvas{display:block;width:100%;background:var(--code);border-radius:6px}
</style>
</head>
<body>
<div class="controls">
  <button id="btcb-acc" class="primary">top-k accuracy</button>
  <button id="btcb-reg">instantaneous regret</button>
  <button id="btcb-play">&#9654; replay</button>
</div>
<canvas id="btcb" height="220"></canvas>
<div class="stats">
  <div class="stat"><div class="label">round</div><div class="value" id="bc-r">1000</div></div>
  <div class="stat"><div class="label">BT top-k acc</div><div class="value" id="bc-bt">0.90</div></div>
  <div class="stat"><div class="label">Comb-UCB top-k acc</div><div class="value" id="bc-cb">0.91</div></div>
  <div class="stat"><div class="label">feedback / round</div><div class="value">1 vs 5</div></div>
</div>
<script>
const COLORS={blue:'#4c8df6',green:'#5fd2a3',orange:'#f0a058',purple:'#c879f0',red:'#e16c6c',gold:'#f5c451',dim:'#8b95a8',fg:'#e6edf3'};

// compact Chart (for the BT-vs-CombUCB replay panel)
class Chart{
  constructor(c,o){this.c=c;this.o=Object.assign({pad:{l:46,r:14,t:18,b:24},grid:4,yMin:0,yMax:1,xMin:0,xMax:null},o||{});this.s={};}
  line(n,col){this.s[n]={col,pts:[]};return this;}
  push(n,x,y){if(!this.s[n])this.line(n,COLORS.blue);this.s[n].pts.push([x,y]);}
  reset(){for(const k in this.s)this.s[k].pts=[];}
  render(){const cv=this.c,dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=cv.clientHeight||cv.height;cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);const p=this.o.pad,pw=W-p.l-p.r,ph=H-p.t-p.b;
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.font='11px ui-monospace,monospace';ctx.fillStyle=COLORS.dim;
    for(let i=0;i<=this.o.grid;i++){const y=p.t+(i/this.o.grid)*ph;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+pw,y);ctx.stroke();}
    let xMax=this.o.xMax,any=false;for(const k in this.s){for(const [x,y] of this.s[k].pts){any=true;if(xMax==null||x>xMax)xMax=x;}}
    if(!any){ctx.fillText('— waiting —',p.l+8,p.t+ph/2);return;}
    if(xMax==null)xMax=1;const yMin=this.o.yMin,yMax=this.o.yMax;
    const xPx=x=>p.l+((x-this.o.xMin)/(xMax-this.o.xMin||1))*pw,yPx=y=>p.t+(1-(y-yMin)/(yMax-yMin||1))*ph;
    ctx.fillText(yMax.toFixed(2),4,p.t+4);ctx.fillText(yMin.toFixed(2),4,p.t+ph+4);ctx.fillText(`${xMax|0}`,W-44,H-6);
    for(const k in this.s){const s=this.s[k];if(s.pts.length<2)continue;ctx.strokeStyle=s.col;ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<s.pts.length;i++){const [x,y]=s.pts[i],px=xPx(x),py=yPx(y);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();}
    let lx=W-p.r-4,ly=p.t+12;ctx.textAlign='right';for(const k in this.s){ctx.fillStyle=this.s[k].col;ctx.fillText(k,lx,ly);ly+=14;}ctx.textAlign='left';
  }
}

// ============ BT vs Combinatorial-UCB replay (from experiments/bt_vs_combucb.py) ============
(function btcb(){
  const D = {"x":[1,11,21,31,41,51,61,71,81,91,101,111,121,131,141,151,161,171,181,191,201,211,221,231,241,251,261,271,281,291,301,311,321,331,341,351,361,371,381,391,401,411,421,431,441,451,461,471,481,491,501,511,521,531,541,551,561,571,581,591,601,611,621,631,641,651,661,671,681,691,701,711,721,731,741,751,761,771,781,791,801,811,821,831,841,851,861,871,881,891,901,911,921,931,941,951,961,971,981,991,1000],"btA":[0.175,0.28,0.38,0.455,0.51,0.54,0.55,0.56,0.57,0.58,0.61,0.635,0.66,0.67,0.685,0.69,0.675,0.68,0.715,0.735,0.73,0.73,0.73,0.745,0.75,0.76,0.755,0.77,0.76,0.78,0.785,0.785,0.775,0.81,0.81,0.815,0.82,0.825,0.83,0.825,0.83,0.81,0.81,0.815,0.83,0.845,0.85,0.855,0.845,0.85,0.85,0.85,0.86,0.86,0.855,0.835,0.845,0.865,0.855,0.855,0.85,0.86,0.855,0.865,0.86,0.87,0.875,0.89,0.885,0.885,0.9,0.895,0.9,0.9,0.9,0.91,0.895,0.9,0.905,0.89,0.9,0.895,0.9,0.895,0.895,0.9,0.895,0.885,0.89,0.895,0.905,0.91,0.9,0.905,0.895,0.895,0.905,0.905,0.905,0.895,0.9],"cbA":[0.155,0.57,0.74,0.725,0.77,0.755,0.755,0.75,0.785,0.78,0.79,0.79,0.815,0.81,0.8,0.815,0.845,0.835,0.84,0.86,0.855,0.825,0.82,0.83,0.855,0.885,0.835,0.855,0.865,0.89,0.885,0.865,0.875,0.855,0.85,0.875,0.865,0.905,0.875,0.88,0.87,0.86,0.865,0.86,0.875,0.88,0.88,0.885,0.885,0.885,0.885,0.875,0.905,0.885,0.87,0.895,0.885,0.89,0.9,0.885,0.895,0.865,0.89,0.88,0.89,0.915,0.91,0.9,0.895,0.88,0.9,0.92,0.92,0.885,0.88,0.87,0.885,0.925,0.895,0.915,0.9,0.88,0.925,0.905,0.91,0.92,0.91,0.885,0.905,0.905,0.86,0.905,0.92,0.895,0.9,0.915,0.935,0.93,0.93,0.91,0.905],"btR":[6.61,4.901,3.609,2.66,1.951,1.721,1.589,1.572,1.499,1.349,1.236,1.087,0.972,0.878,0.84,0.805,0.773,0.739,0.608,0.514,0.532,0.541,0.517,0.53,0.527,0.517,0.474,0.457,0.441,0.41,0.414,0.412,0.403,0.34,0.331,0.325,0.31,0.281,0.257,0.253,0.236,0.253,0.254,0.239,0.232,0.191,0.185,0.159,0.167,0.154,0.158,0.168,0.143,0.175,0.176,0.188,0.167,0.136,0.151,0.153,0.179,0.151,0.148,0.144,0.143,0.136,0.127,0.116,0.121,0.121,0.123,0.137,0.121,0.134,0.12,0.105,0.116,0.108,0.104,0.119,0.103,0.116,0.095,0.112,0.113,0.113,0.111,0.12,0.119,0.109,0.104,0.095,0.105,0.098,0.111,0.105,0.087,0.087,0.092,0.106,0.091],"cbR":[7.121,1.887,0.871,0.779,0.684,0.634,0.575,0.608,0.44,0.47,0.423,0.507,0.447,0.501,0.453,0.366,0.431,0.318,0.432,0.22,0.276,0.505,0.432,0.465,0.283,0.293,0.438,0.37,0.276,0.107,0.2,0.24,0.188,0.329,0.329,0.262,0.239,0.136,0.323,0.21,0.275,0.269,0.216,0.207,0.181,0.262,0.179,0.258,0.114,0.178,0.092,0.192,0.1,0.195,0.212,0.111,0.183,0.177,0.19,0.141,0.227,0.189,0.109,0.153,0.114,0.114,0.092,0.15,0.165,0.178,0.161,0.163,0.087,0.192,0.159,0.194,0.239,0.07,0.187,0.158,0.153,0.157,0.107,0.138,0.125,0.069,0.069,0.157,0.121,0.105,0.204,0.146,0.173,0.124,0.085,0.099,0.062,0.135,0.05,0.092,0.137]};
  const cv=document.getElementById('btcb');if(!cv)return;
  const bch=new Chart(cv,{xMin:0,yMin:0,yMax:1});
  let metric='acc',drawTo=D.x.length;
  function build(){
    bch.s={};bch.o.yMax=(metric==='acc')?1:3.5;
    bch.line('Bradley-Terry',COLORS.purple);bch.line('Comb-UCB',COLORS.green);
    const bt=metric==='acc'?D.btA:D.btR, cb=metric==='acc'?D.cbA:D.cbR;
    const n=Math.min(drawTo,D.x.length);
    for(let i=0;i<n;i++){bch.push('Bradley-Terry',D.x[i],bt[i]);bch.push('Comb-UCB',D.x[i],cb[i]);}
    bch.render();
    const idx=Math.min(n-1,D.x.length-1);
    document.getElementById('bc-r').textContent=D.x[idx];
    document.getElementById('bc-bt').textContent=D.btA[idx].toFixed(2);
    document.getElementById('bc-cb').textContent=D.cbA[idx].toFixed(2);
  }
  document.getElementById('btcb-acc').onclick=()=>{metric='acc';document.getElementById('btcb-acc').classList.add('primary');document.getElementById('btcb-reg').classList.remove('primary');build();};
  document.getElementById('btcb-reg').onclick=()=>{metric='reg';document.getElementById('btcb-reg').classList.add('primary');document.getElementById('btcb-acc').classList.remove('primary');build();};
  document.getElementById('btcb-play').onclick=()=>{drawTo=2;(function tick(){drawTo+=2;build();if(drawTo<D.x.length)requestAnimationFrame(tick);else drawTo=D.x.length;})();};
  build();
  window.addEventListener('resize',()=>bch.render());
})();
</script>
</body>
</html>
