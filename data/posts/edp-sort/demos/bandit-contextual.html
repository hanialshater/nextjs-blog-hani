<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contextual dinner bandit</title>
<style>
:root{--bg:#0b1220;--card:#131c30;--card2:#1a2440;--fg:#e6edf3;--dim:#8b95a8;--faint:#5b6378;--accent:#4c8df6;--accent2:#2a4a7a;--good:#5fd2a3;--warn:#f0a058;--bad:#e16c6c;--purple:#c879f0;--border:#1f2a44;--code:#0e1626;--mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",Inter,Roboto,sans-serif}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--fg)}
body{font-family:var(--sans);font-size:15px;line-height:1.5;padding:12px}
.widget{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:0;overflow:hidden}
.legend{font-size:13px;color:var(--dim);margin-bottom:14px}
button{font-family:var(--mono);font-size:13px;background:var(--card2);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:7px 13px;cursor:pointer;transition:all 0.12s}
button:hover{background:var(--accent2);border-color:var(--accent)}
button.primary{background:var(--accent);color:#0b1220;border-color:var(--accent);font-weight:600}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:14px 0 18px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:14px 0 0;font-family:var(--mono);font-size:13px}
.stat{background:var(--code);padding:9px 11px;border-radius:6px;min-width:0}
.stat .label{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:0.08em}
.stat .value{color:var(--fg);font-size:17px;margin-top:3px;overflow-wrap:anywhere}
.stat .sub{color:var(--dim);font-size:10.5px;margin-top:2px;overflow-wrap:anywhere}
canvas{display:block;width:100%;background:var(--code);border-radius:6px}
.context-card{background:var(--code);border:1px solid var(--border);border-radius:8px;padding:12px;margin:12px 0}
.context-title{font-family:var(--mono);font-size:12px;color:var(--fg);margin-bottom:8px}
.context-chips{display:flex;flex-wrap:wrap;gap:6px}
.context-chips span{font-family:var(--mono);font-size:11px;color:var(--dim);border:1px solid var(--border);border-radius:999px;padding:4px 8px;background:rgba(255,255,255,0.035)}
.context-chips span.on{color:var(--good);border-color:rgba(95,210,163,0.45);background:rgba(95,210,163,0.08)}
@media(max-width:520px){body{padding:8px}.widget{padding:12px}.controls button{flex:1 1 auto}.stats{grid-template-columns:1fr}.legend{font-size:12px}.context-title{font-size:11px}canvas{height:220px}}
</style>
</head>
<body>
<div class="widget">
<p class="legend">Each night has a situation. Plain Thompson sees only restaurant averages; LinUCB sees the context vector before choosing. Lower regret means fewer bad-context dinners.</p>
<div class="context-card">
  <div class="context-title" id="ctxTitle">context: —</div>
  <div class="context-chips" id="ctxChips"></div>
</div>
<div class="controls">
  <button id="ctxPlay" class="primary">▶ play</button>
  <button id="ctx1">+1 night</button>
  <button id="ctx50">+50 nights</button>
  <button id="ctxReset">reset contexts</button>
</div>
<canvas id="ctxcanvas" height="230"></canvas>
<div class="stats">
  <div class="stat"><div class="label">night</div><div class="value" id="ctxT">0</div></div>
  <div class="stat"><div class="label">plain Thompson</div><div class="value" id="ctxPlain">0.0</div><div class="sub" id="ctxPlainPick">—</div></div>
  <div class="stat"><div class="label">contextual LinUCB</div><div class="value" id="ctxLin">0.0</div><div class="sub" id="ctxLinPick">—</div></div>
  <div class="stat"><div class="label">oracle tonight</div><div class="value" id="ctxBest">—</div></div>
</div>
</div>
<script>
// ============ shared lib ============
const COLORS={blue:'#4c8df6',green:'#5fd2a3',orange:'#f0a058',purple:'#c879f0',red:'#e16c6c',dim:'#8b95a8',faint:'#3a4358',fg:'#e6edf3',bg:'#0e1626'};
function rng(seed){let s=seed|0||1;return function(){s=(s+0x6D2B79F5)|0;let t=s;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;};}
function gauss(rand){let u=rand()||1e-12,v=rand();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function gammaSample(shape,rand){
  if(shape<1){const u=Math.max(rand(),1e-12);return gammaSample(shape+1,rand)*Math.pow(u,1/shape);}
  const d=shape-1/3,c=1/Math.sqrt(9*d);
  while(true){let x=gauss(rand),v=1+c*x;if(v<=0)continue;v=v*v*v;const u=rand(),x2=x*x;if(u<1-0.0331*x2*x2)return d*v;if(Math.log(u)<0.5*x2+d*(1-v+Math.log(v)))return d*v;}
}
function beta(a,b,rand){const x=gammaSample(a,rand),y=gammaSample(b,rand);return x/(x+y);}
function argmax(a){let i=0;for(let j=1;j<a.length;j++)if(a[j]>a[i])i=j;return i;}
function dot(a,b){let s=0;for(let i=0;i<a.length;i++)s+=a[i]*b[i];return s;}
function solveLinear(A,b){
  const n=b.length,M=A.map((row,i)=>row.slice().concat(b[i]));
  for(let col=0;col<n;col++){
    let pivot=col;
    for(let r=col+1;r<n;r++)if(Math.abs(M[r][col])>Math.abs(M[pivot][col]))pivot=r;
    if(pivot!==col){const tmp=M[col];M[col]=M[pivot];M[pivot]=tmp;}
    const div=Math.abs(M[col][col])<1e-9?1e-9:M[col][col];
    for(let c=col;c<=n;c++)M[col][c]/=div;
    for(let r=0;r<n;r++)if(r!==col){const f=M[r][col];for(let c=col;c<=n;c++)M[r][c]-=f*M[col][c];}
  }
  return M.map(row=>row[n]);
}
class Chart{
  constructor(canvas,opts){this.canvas=canvas;this.opts=Object.assign({xlabel:'',ylabel:'',padding:{l:46,r:14,t:18,b:28},grid:4,yMin:null,yMax:null,xMin:0,xMax:null,shade:null},opts||{});this.series={};}
  line(name,color){this.series[name]={color:color||COLORS.blue,points:[]};return this;}
  push(name,x,y){if(!this.series[name])this.line(name);this.series[name].points.push([x,y]);}
  reset(){for(const k in this.series)this.series[k].points=[];}
  _bounds(){let xM=this.opts.xMax,yM=this.opts.yMax,ym=this.opts.yMin,any=false;for(const k in this.series){const p=this.series[k].points;if(!p.length)continue;any=true;for(const [x,y] of p){if(xM===null||x>xM)xM=x;if(yM===null||y>yM)yM=y;if(ym===null||y<ym)ym=y;}}if(!any)return null;if(xM===null)xM=1;if(yM===null)yM=1;if(ym===null)ym=0;if(yM-ym<1e-6)yM=ym+1;return{xMin:this.opts.xMin,xMax:xM,yMin:ym,yMax:yM};}
  render(){const c=this.canvas,dpr=window.devicePixelRatio||1,W=c.clientWidth,H=c.clientHeight||c.height;c.width=W*dpr;c.height=H*dpr;const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);const p=this.opts.padding,pw=W-p.l-p.r,ph=H-p.t-p.b;
    if(this.opts.shade){const b=this._bounds();if(b){const xs=Math.max(b.xMin,this.opts.shade[0]),xe=Math.min(b.xMax,this.opts.shade[1]);if(xe>xs){const x1=p.l+((xs-b.xMin)/(b.xMax-b.xMin||1))*pw,x2=p.l+((xe-b.xMin)/(b.xMax-b.xMin||1))*pw;ctx.fillStyle='rgba(240,160,88,0.06)';ctx.fillRect(x1,p.t,x2-x1,ph);}}}
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.font='11px ui-monospace,Menlo,monospace';ctx.fillStyle=COLORS.dim;
    for(let i=0;i<=this.opts.grid;i++){const y=p.t+(i/this.opts.grid)*ph;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+pw,y);ctx.stroke();}
    const b=this._bounds();if(!b){ctx.fillText('— waiting —',p.l+8,p.t+ph/2);return;}
    const xPx=x=>p.l+((x-b.xMin)/(b.xMax-b.xMin||1))*pw,yPx=y=>p.t+(1-(y-b.yMin)/(b.yMax-b.yMin||1))*ph;
    ctx.fillText(b.yMax.toFixed(b.yMax>10?0:1),4,p.t+4);ctx.fillText(b.yMin.toFixed(b.yMin>10?0:1),4,p.t+ph+4);
    ctx.fillText(this.opts.xlabel?`${this.opts.xlabel}: ${b.xMax|0}`:`${b.xMax|0}`,W-100,H-6);
    for(const name in this.series){const s=this.series[name];if(s.points.length<2)continue;ctx.strokeStyle=s.color;ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<s.points.length;i++){const [x,y]=s.points[i],px=xPx(x),py=yPx(y);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();}
    let lx=W-p.r-8,ly=p.t+12;ctx.textAlign='right';
    for(const name in this.series){const s=this.series[name];ctx.fillStyle=s.color;const last=s.points[s.points.length-1];const lbl=last?`${name}  ${last[1].toFixed(1)}`:name;ctx.fillText(lbl,lx,ly);ly+=14;}ctx.textAlign='left';
  }
}

const K=5;
const RESTAURANTS=[
  {name:'Ramen Den'},{name:'Taco Yard'},{name:'Biryani House'},{name:'Sushi Bar'},{name:'Pasta Corner'}
];
function newBandit(ps, randSeed){
  const r=rng(randSeed);
  return {ps:ps.slice(),pulls:new Array(K).fill(0),successes:new Array(K).fill(0),cumRegret:0,bestArm:argmax(ps),bestMean:Math.max(...ps),history:[],rng:r};
}
function thompsonPick(b){const s=b.pulls.map((n,i)=>{const a=1+b.successes[i],bb=1+(n-b.successes[i]);return beta(a,bb,b.rng);});return argmax(s);}

// ============ Contextual restaurant bandit ============
(function contextual(){
  const cv=document.getElementById('ctxcanvas');
  if(!cv)return;
  const contexts=[
    {name:'quick lunch',desc:'You have 35 minutes and want low friction.',x:[1,1,0,0,1]},
    {name:'family dinner',desc:'Comfort, space, and reliability matter.',x:[1,0,1,0,0]},
    {name:'rainy solo dinner',desc:'Comfort and spice beat speed.',x:[1,0,0,1,0]},
    {name:'cheap group meal',desc:'Friends want something casual and affordable.',x:[1,0,1,1,1]},
    {name:'tired safe choice',desc:'You want close, filling, and predictable.',x:[1,1,0,0,1]}
  ];
  const featureLabels=['bias','quick','social','spicy','budget'];
  const theta=[
    [0.35,0.20,-0.10,0.18,0.05],
    [0.38,0.18,0.05,0.12,0.18],
    [0.33,-0.12,0.08,0.28,-0.03],
    [0.36,-0.08,0.25,-0.15,-0.20],
    [0.42,0.08,0.02,-0.22,0.12]
  ];
  const d=featureLabels.length,alpha=0.75;
  const rand=rng(4242);
  const ch=new Chart(cv,{xlabel:'night',ylabel:'regret',xMin:0,yMin:0,padding:{l:46,r:14,t:18,b:28},shade:[0,80]});
  let plain,lin,t=0,current=contexts[0],plainReg=0,linReg=0,lastPlain='—',lastLin='—',playing=false,frame=null;
  function eye(){return Array.from({length:d},(_,i)=>Array.from({length:d},(_,j)=>i===j?1:0));}
  function initLin(){return {A:Array.from({length:K},()=>eye()),b:Array.from({length:K},()=>Array(d).fill(0))};}
  function prob(ctx,arm){return Math.max(0.05,Math.min(0.92,dot(ctx.x,theta[arm])));}
  function bestArmFor(ctx){return argmax(RESTAURANTS.map((_,i)=>prob(ctx,i)));}
  function linPick(st,ctx){
    const scores=RESTAURANTS.map((_,a)=>{
      const invb=solveLinear(st.A[a],st.b[a]);
      const invx=solveLinear(st.A[a],ctx.x);
      return dot(ctx.x,invb)+alpha*Math.sqrt(Math.max(0,dot(ctx.x,invx)));
    });
    return argmax(scores);
  }
  function linUpdate(st,arm,x,r){
    for(let i=0;i<d;i++){st.b[arm][i]+=r*x[i];for(let j=0;j<d;j++)st.A[arm][i][j]+=x[i]*x[j];}
  }
  function updateContextUi(){
    document.getElementById('ctxTitle').textContent=`context: ${current.name} — ${current.desc}`;
    document.getElementById('ctxChips').innerHTML=featureLabels.slice(1).map((f,i)=>`<span class="${current.x[i+1]?'on':''}">${f}: ${current.x[i+1]}</span>`).join('');
    const best=bestArmFor(current);
    document.getElementById('ctxBest').textContent=RESTAURANTS[best].name;
  }
  function setPlayButton(){document.getElementById('ctxPlay').textContent=playing?'⏸ pause':'▶ play';}
  function stop(){playing=false;if(frame!==null){cancelAnimationFrame(frame);frame=null;}setPlayButton();}
  function reset(){
    stop();
    plain=newBandit([0.5,0.5,0.5,0.5,0.5],991);
    lin=initLin();t=0;plainReg=0;linReg=0;lastPlain='—';lastLin='—';
    ch.reset();ch.line('plain Thompson',COLORS.dim).line('contextual LinUCB',COLORS.blue);
    current=contexts[0];render();
  }
  function one(){
    current=contexts[Math.floor(rand()*contexts.length)];
    const best=bestArmFor(current),bestP=prob(current,best);
    const plainArm=thompsonPick(plain);
    const plainReward=rand()<prob(current,plainArm)?1:0;
    plain.pulls[plainArm]++;plain.successes[plainArm]+=plainReward;
    plainReg+=bestP-prob(current,plainArm);
    const linArm=linPick(lin,current);
    const linReward=rand()<prob(current,linArm)?1:0;
    linUpdate(lin,linArm,current.x,linReward);
    linReg+=bestP-prob(current,linArm);
    t++;
    lastPlain=RESTAURANTS[plainArm].name;
    lastLin=RESTAURANTS[linArm].name;
    ch.push('plain Thompson',t,plainReg);
    ch.push('contextual LinUCB',t,linReg);
    render();
  }
  function step(n){for(let i=0;i<n;i++)one();}
  function loop(){
    if(!playing)return;
    step(2);
    frame=requestAnimationFrame(loop);
  }
  function togglePlay(){
    playing=!playing;
    setPlayButton();
    if(playing)loop();
    else if(frame!==null){cancelAnimationFrame(frame);frame=null;}
  }
  function render(){
    updateContextUi();
    document.getElementById('ctxT').textContent=t;
    document.getElementById('ctxPlain').textContent=plainReg.toFixed(1);
    document.getElementById('ctxLin').textContent=linReg.toFixed(1);
    document.getElementById('ctxPlainPick').textContent=lastPlain;
    document.getElementById('ctxLinPick').textContent=lastLin;
    ch.render();
  }
  document.getElementById('ctxPlay').onclick=togglePlay;
  document.getElementById('ctx1').onclick=()=>step(1);
  document.getElementById('ctx50').onclick=()=>step(50);
  document.getElementById('ctxReset').onclick=reset;
  reset();
  window.addEventListener('resize',()=>ch.render());
})();
</script>
<script>
/* report content height to the embedding page so the iframe can auto-size */
(function(){
  if(window.parent===window)return;
  function postHeight(){var h=Math.ceil(document.documentElement.getBoundingClientRect().height);window.parent.postMessage({type:'demo-height',height:h},'*');}
  window.addEventListener('load',function(){postHeight();setTimeout(postHeight,250);setTimeout(postHeight,700);});
  window.addEventListener('resize',postHeight);
  if(window.ResizeObserver){try{new ResizeObserver(postHeight).observe(document.body);}catch(e){}}
})();
</script>
</body>
</html>
