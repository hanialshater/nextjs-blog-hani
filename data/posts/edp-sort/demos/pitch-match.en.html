<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pitch Match: sort from noisy games</title>
<style>
:root{--bg:#0b1220;--card:#131c30;--card2:#1a2440;--fg:#e6edf3;--dim:#8b95a8;--accent:#4c8df6;--good:#5fd2a3;--warn:#f0a058;--bad:#e16c6c;--gold:#f5c451;--border:#1f2a44;--code:#0e1626;--mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",Inter,Roboto,sans-serif}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--fg)}body{font-family:var(--sans);font-size:15px;line-height:1.45;padding:12px}.root{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}.stat{background:var(--code);border:1px solid var(--border);border-radius:8px;padding:8px 10px}.label{font-family:var(--mono);font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}.value{font-family:var(--mono);font-size:18px;margin-top:3px}.main{display:grid;grid-template-columns:1.35fr 1fr;gap:14px}.pitch-wrap{position:relative}.pitch{width:100%;height:300px;display:block;border-radius:10px;background:#15692f}.banner{position:absolute;left:50%;top:10px;transform:translateX(-50%);background:rgba(8,14,24,.84);border:1px solid var(--border);border-radius:999px;padding:5px 14px;font-family:var(--mono);font-size:12px;white-space:nowrap}.board{background:var(--code);border:1px solid var(--border);border-radius:10px;padding:8px}.board h3{margin:2px 4px 8px;font-family:var(--mono);font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between}.row{display:grid;grid-template-columns:24px 1fr auto;gap:8px;align-items:center;padding:5px 4px;border-radius:7px;cursor:pointer;transition:background .18s}.row:hover{background:rgba(76,141,246,.09)}.row.selected,.row.playing{background:rgba(76,141,246,.14)}.rank{font-family:var(--mono);font-size:12px;color:var(--dim);text-align:right}.name{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px}.dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}.bar{height:6px;background:#0b1220;border-radius:3px;margin-top:4px;overflow:hidden}.bar i{display:block;height:100%;border-radius:3px;transition:width .35s}.meta{font-family:var(--mono);font-size:10px;color:var(--dim);text-align:right}.true{color:var(--gold)}.controls{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:12px}button,select{font-family:var(--mono);font-size:12px;background:var(--card2);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;cursor:pointer}button:hover,select:hover{border-color:var(--accent)}button.primary{background:var(--accent);border-color:var(--accent);color:#07101e;font-weight:700}.why{font-family:var(--mono);font-size:11px;color:var(--dim);min-height:16px;margin-top:8px}.why b{color:var(--accent)}.chart{width:100%;height:88px;display:block;background:var(--code);border:1px solid var(--border);border-radius:8px;margin-top:12px}@media(max-width:680px){.main{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="root">
  <div class="stats"><div class="stat"><div class="label">matches played</div><div class="value" id="matches">0</div></div><div class="stat"><div class="label">table correctness τ</div><div class="value" id="tau">0.00</div></div><div class="stat"><div class="label">scheduler</div><div class="value" id="scheduler">ladder</div></div><div class="stat"><div class="label">current #1</div><div class="value" id="leader">—</div></div></div>
  <div class="main"><div class="pitch-wrap"><canvas class="pitch" id="pitch" height="300"></canvas><div class="banner" id="banner">press play</div></div><div class="board"><h3><span>league table</span><span id="source">Elo estimate</span></h3><div id="rows"></div></div></div>
  <div class="controls"><button class="primary" id="play">▶ play</button><button id="one">+1 match</button><button id="many">+30 instant</button><button id="reveal">reveal true skill</button><button id="reset">reset league</button><label>scheduler <select id="policy"><option value="manual">you scout (click 2)</option><option value="random">random</option><option value="roundrobin">round-robin</option><option value="ladder" selected>ladder (adjacent)</option><option value="active">active (boundary)</option></select></label></div>
  <div class="why" id="why"></div><canvas class="chart" id="chart" height="88"></canvas>
</div>
<script>
const players=[['Ada','AD','#4c8df6'],['Bruno','BR','#5fd2a3'],['Cruz','CR','#f0a058'],['Dembe','DE','#c879f0'],['Enzo','EN','#e16c6c'],['Frida','FR','#ff7eb6'],['Goro','GO','#f5c451'],['Hana','HA','#7ee0d0']].map((p,i)=>({name:p[0],short:p[1],color:p[2],i}));
const N=players.length;const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));const sigmoid=x=>1/(1+Math.exp(-x));const argmax=a=>a.reduce((m,v,i)=>v>a[m]?i:m,0);
let trueSkill,rating,games,wins,matches,history,revealed,policy='ladder',selected=[],running=false,anim=null,raf=null,fallback=null,seed=7;
function rand(){seed=(seed*1664525+1013904223)>>>0;return seed/4294967296}function ranks(scores){const out=Array(N);[...Array(N).keys()].sort((a,b)=>scores[b]-scores[a]).forEach((i,k)=>out[i]=k);return out}function tau(a,b){let c=0,d=0;for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){const x=Math.sign(a[i]-a[j]),y=Math.sign(b[i]-b[j]);if(x*y>0)c++;else if(x*y<0)d++}return(c-d)/(N*(N-1)/2)}
function reset(){seed=(Date.now()&0xffff)+7;const base=[1.8,1.25,.75,.25,-.25,-.75,-1.25,-1.8];for(let i=base.length-1;i>0;i--){const j=(rand()*(i+1))|0;[base[i],base[j]]=[base[j],base[i]]}trueSkill=base;rating=Array(N).fill(0);games=Array.from({length:N},()=>Array(N).fill(0));wins=Array.from({length:N},()=>Array(N).fill(0));matches=0;history=[];revealed=false;selected=[];running=false;anim=null;clearTimeout(fallback);$('play').textContent='▶ play';$('reveal').textContent='reveal true skill';$('banner').textContent='press play';$('why').textContent='';render();drawPitch(null)}
function choosePair(){const pairs=[];for(let i=0;i<N;i++)for(let j=i+1;j<N;j++)pairs.push([i,j]);if(policy==='random')return pairs[(rand()*pairs.length)|0];if(policy==='roundrobin'){return pairs.reduce((best,p)=>games[p[0]][p[1]]<games[best[0]][best[1]]?p:best,pairs[0])}const rank=ranks(rating);if(policy==='ladder'){const adj=pairs.filter(([i,j])=>Math.abs(rank[i]-rank[j])===1);return adj.reduce((best,p)=>games[p[0]][p[1]]<games[best[0]][best[1]]?p:best,adj[0])}return pairs.reduce((best,p)=>{const score=0.62/(1+Math.abs(rank[p[0]]-rank[p[1]]))+0.38/(1+games[p[0]][p[1]]);const bestScore=0.62/(1+Math.abs(rank[best[0]]-rank[best[1]]))+0.38/(1+games[best[0]][best[1]]);return score>bestScore?p:best},pairs[0])}
function start(i,j){if(anim)return;const p=sigmoid(1.15*(trueSkill[i]-trueSkill[j]));const winner=rand()<p?i:j;anim={i,j,winner,start:performance.now(),duration:900,done:false};$('banner').innerHTML=`${players[i].name} <span style="color:#8b95a8">vs</span> ${players[j].name}`;$('why').innerHTML=policy==='manual'?`you selected <b>${players[i].name}</b> vs <b>${players[j].name}</b>`:`<b>${players[i].name}</b> vs <b>${players[j].name}</b> — ${policy==='active'?'near a decision boundary':'chosen by '+policy}`;render();fallback=setTimeout(()=>finish(),1100)}
function finish(){if(!anim||anim.done)return;anim.done=true;clearTimeout(fallback);const {i,j,winner}=anim,loser=winner===i?j:i;const expected=sigmoid(rating[i]-rating[j]);const k=0.42;if(winner===i){rating[i]+=k*(1-expected);rating[j]-=k*(1-expected)}else{rating[j]+=k*expected;rating[i]-=k*expected}wins[winner][loser]++;games[i][j]++;games[j][i]++;matches++;history.push(tau(ranks(rating),ranks(trueSkill)));$('banner').innerHTML=`<b>${players[winner].name}</b> scores! ⚽`;anim=null;render();drawPitch(null);if(running)setTimeout(()=>{if(running)start(...choosePair())},180)}
function frame(now){if(anim){const t=clamp((now-anim.start)/anim.duration,0,1);drawPitch(t);if(t>=1)finish()}raf=requestAnimationFrame(frame)}
function drawPitch(progress){const c=$('pitch'),dpr=devicePixelRatio||1,w=c.clientWidth||520,h=300;c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.setTransform(dpr,0,0,dpr,0,0);for(let k=0;k<8;k++){x.fillStyle=k%2?'#15692f':'#19743a';x.fillRect(k*w/8,0,w/8+1,h)}x.strokeStyle='rgba(235,250,238,.58)';x.lineWidth=2;x.strokeRect(8,8,w-16,h-16);x.beginPath();x.moveTo(w/2,8);x.lineTo(w/2,h-8);x.stroke();x.beginPath();x.arc(w/2,h/2,34,0,Math.PI*2);x.stroke();x.strokeRect(8,h/2-42,45,84);x.strokeRect(w-53,h/2-42,45,84);let ballX=w/2,ballY=h/2,wi=null,li=null,flash=0;if(anim){wi=anim.winner;li=anim.winner===anim.i?anim.j:anim.i;const e=progress<.5?2*progress*progress:1-Math.pow(-2*progress+2,2)/2;ballX=w/2+(w-34-w/2)*e;ballY=h/2+Math.sin(progress*Math.PI)*18;if(progress>.76)flash=Math.sin((progress-.76)/.24*Math.PI)}function token(px,py,index,big){if(index==null)return;const p=players[index];x.beginPath();x.arc(px,py,big?16:13,0,Math.PI*2);x.fillStyle=p.color;x.fill();x.strokeStyle=big&&flash>0?'#fff':'#08111f';x.lineWidth=2.5;x.stroke();x.fillStyle='#08111f';x.font='bold 11px ui-monospace,monospace';x.textAlign='center';x.textBaseline='middle';x.fillText(p.short,px,py+1)}if(anim){x.strokeStyle='rgba(255,255,255,.28)';x.lineWidth=2;x.beginPath();x.moveTo(w/2,h/2);x.lineTo(ballX,ballY);x.stroke();token(ballX-18,ballY+7,wi,true);token(ballX-38,ballY-12,li,false)}if(flash){x.fillStyle=`rgba(245,196,81,${.35*flash})`;x.fillRect(w-58,h/2-48,50,96)}x.beginPath();x.arc(ballX,ballY,6,0,Math.PI*2);x.fillStyle='#fff';x.fill();x.strokeStyle='#222';x.lineWidth=1;x.stroke();if(!anim){x.fillStyle='rgba(235,250,238,.75)';x.font='12px ui-monospace,monospace';x.textAlign='center';x.fillText(matches?'next match…':'press play',w/2,h-18)}}
function render(){const rank=ranks(rating),trueRank=ranks(trueSkill),order=[...Array(N).keys()].sort((a,b)=>rank[a]-rank[b]);$('matches').textContent=matches;$('tau').textContent=tau(rank,trueRank).toFixed(2);$('scheduler').textContent=policy;$('leader').textContent=players[order[0]].name;$('source').textContent=revealed?'true skill shown':'Elo estimate';$('rows').innerHTML=order.map(i=>{const min=Math.min(...rating),max=Math.max(...rating),width=20+78*(rating[i]-min)/((max-min)||1);const selectedClass=selected.includes(i)?' selected':'';const playing=anim&&(anim.i===i||anim.j===i)?' playing':'';let totalW=0,totalL=0;for(let j=0;j<N;j++){totalW+=wins[i][j];totalL+=wins[j][i]}return `<div class="row${selectedClass}${playing}" data-id="${i}"><div class="rank">${rank[i]+1}</div><div><div class="name"><span class="dot" style="background:${players[i].color}"></span>${players[i].name}</div><div class="bar"><i style="width:${width}%;background:${players[i].color}"></i></div></div><div class="meta">${totalW}-${totalL} · ${games[i].reduce((a,b)=>a+b,0)} gp${revealed?`<div class="true">true #${trueRank[i]+1}</div>`:''}</div></div>`}).join('');document.querySelectorAll('.row').forEach(row=>row.onclick=()=>manualClick(+row.dataset.id));drawChart()}
function manualClick(i){if(policy!=='manual'||anim)return;if(selected.includes(i))selected=selected.filter(x=>x!==i);else if(selected.length<2)selected.push(i);if(selected.length===2){const [a,b]=selected;selected=[];start(a,b)}else{$('why').textContent=selected.length?`pick an opponent for ${players[selected[0]].name}`:'you are the scout — click two players to stage a match'}render()}
function drawChart(){const c=$('chart'),dpr=devicePixelRatio||1,w=c.clientWidth,h=c.clientHeight;c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.setTransform(dpr,0,0,dpr,0,0);x.clearRect(0,0,w,h);x.strokeStyle='rgba(255,255,255,.07)';for(let k=0;k<3;k++){const y=12+k*(h-28)/2;x.beginPath();x.moveTo(32,y);x.lineTo(w-10,y);x.stroke()}x.fillStyle='#8b95a8';x.font='10px ui-monospace,monospace';x.fillText('Kendall τ',6,15);x.fillText('matches',w-58,h-6);if(history.length>1){x.strokeStyle='#5fd2a3';x.lineWidth=2;x.beginPath();history.forEach((v,i)=>{const px=32+i/(history.length-1)*(w-42),py=12+(1-clamp((v+.2)/1.2,0,1))*(h-28);i?x.lineTo(px,py):x.moveTo(px,py)});x.stroke()}}
$('play').onclick=()=>{if(policy==='manual'){$('why').textContent='you are the scout — click two players to stage a match';return}running=!running;$('play').textContent=running?'⏸ pause':'▶ play';if(running&&!anim)start(...choosePair())};$('one').onclick=()=>{running=false;$('play').textContent='▶ play';if(!anim)start(...choosePair())};$('many').onclick=()=>{running=false;$('play').textContent='▶ play';if(anim)finish();for(let k=0;k<30;k++){const [i,j]=choosePair();const winner=rand()<sigmoid(1.15*(trueSkill[i]-trueSkill[j]))?i:j;anim={i,j,winner,done:false};finish()}render()};$('reveal').onclick=()=>{revealed=!revealed;$('reveal').textContent=revealed?'hide true skill':'reveal true skill';render()};$('reset').onclick=reset;$('policy').onchange=e=>{policy=e.target.value;running=false;$('play').textContent='▶ play';selected=[];$('why').textContent=policy==='manual'?'you are the scout — click two players to stage a match':'';render()};addEventListener('resize',()=>{drawPitch(anim?clamp((performance.now()-anim.start)/anim.duration,0,1):null);drawChart()});reset();raf=requestAnimationFrame(frame);
(function(){function h(){parent.postMessage({type:'demo-height',height:Math.ceil(document.documentElement.getBoundingClientRect().height)},'*')}addEventListener('load',()=>{h();setTimeout(h,250);setTimeout(h,800)});addEventListener('resize',h);new ResizeObserver(h).observe(document.body)})();
</script>
</body>
</html>
