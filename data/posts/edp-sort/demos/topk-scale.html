<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>10,000 players: top-K identification from BTL matches</title>
<style>
:root{--bg:#0b1220;--card:#131c30;--panel:#0e1626;--edge:#263552;--text:#e6edf3;--muted:#9aa8bd;--blue:#4c8df6;--green:#5fd2a3;--gold:#f5c451;--gray:#8b95a8;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text)}body{padding:12px;font:14px/1.45 system-ui,-apple-system,Segoe UI,sans-serif}.root{padding:16px;background:var(--card);border:1px solid var(--edge);border-radius:14px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.stat{background:var(--panel);border:1px solid var(--edge);border-radius:9px;padding:8px 10px}.label{font:10px var(--mono);letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}.value{font:18px var(--mono);margin-top:3px}.grid{display:grid;grid-template-columns:1.3fr 1fr;gap:12px;margin-top:12px}canvas{display:block;width:100%;height:240px;background:var(--panel);border:1px solid var(--edge);border-radius:9px}.caption{text-align:center;color:var(--muted);font:10px var(--mono);margin-top:3px}.controls{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:12px}button,select{border:1px solid var(--edge);border-radius:7px;background:#1a2440;color:var(--text);font:12px var(--mono);padding:7px 9px;cursor:pointer}button:hover,select:hover{border-color:var(--blue)}button.primary{background:var(--blue);border-color:var(--blue);color:#06101d;font-weight:700}.note{background:var(--panel);border:1px solid var(--edge);border-radius:9px;padding:9px 10px;color:var(--muted);font-size:12px;margin-top:12px}.note b{color:var(--green)}.note strong{color:var(--gold)}@media(max-width:650px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr)}}
</style>
</head>
<body>
<div class="root">
  <div class="stats"><div class="stat"><div class="label">players</div><div class="value">10,000</div></div><div class="stat"><div class="label">target</div><div class="value" id="target">top 100</div></div><div class="stat"><div class="label">matches each</div><div class="value" id="matches">0</div></div><div class="stat"><div class="label">cutline recall</div><div class="value" id="recall">0%</div></div></div>
  <div class="grid"><div><canvas id="race" height="240"></canvas><div class="caption">true top-K recovered by the estimated top-K</div></div><div><canvas id="scatter" height="240"></canvas><div class="caption">adaptive Elo estimate versus hidden skill · 600 sampled players</div></div></div>
  <div class="controls"><button class="primary" id="play">▶ run matches</button><button id="step">+1,000</button><button id="reset">reset</button><label>find <select id="k"><option value="10">top 10</option><option value="100" selected>top 100</option><option value="500">top 500</option></select></label></div>
  <div class="note" id="note"></div>
</div>
<script src="./edp-core.js"></script>
<script>
(() => {
  const { eloUpdate, mulberry32, normal, ranks, resizeCanvas, sigmoid, topK } = window.EDP
  const n = 10000
  const $ = (id) => document.getElementById(id)
  let k = 100, rng, skills, ratingsRandom, ratingsCutline, gamesRandom, gamesCutline, trueTop, trueCutline, matches, randomHistory, cutlineHistory, running, frame, sample

  function reset() {
    rng = mulberry32((Date.now() >>> 0) || 7)
    skills = new Float32Array(n)
    for (let index = 0; index < n; index += 1) skills[index] = normal(rng)
    const truth = topK(skills, k)
    trueTop = new Set(truth)
    trueCutline = skills[truth[k - 1]]
    ratingsRandom = new Float32Array(n)
    ratingsCutline = new Float32Array(n)
    gamesRandom = new Uint16Array(n)
    gamesCutline = new Uint16Array(n)
    matches = 0
    randomHistory = []
    cutlineHistory = []
    running = false
    cancelAnimationFrame(frame)
    $('play').textContent = '▶ run matches'
    sample = Array.from({ length: 600 }, () => Math.floor(rng() * n))
    evaluate(true)
    draw()
  }

  function randomPair(localRng) {
    const left = Math.floor(localRng() * n)
    let right = Math.floor(localRng() * n)
    if (left === right) right = (right + 1) % n
    return [left, right]
  }

  function candidatePool(localRng, size = 512) {
    const pool = new Set()
    while (pool.size < size) pool.add(Math.floor(localRng() * n))
    return [...pool]
  }

  function chooseCutlinePair(localRng) {
    // Early broad exploration prevents a candidate from being permanently hidden.
    if (matches < 2500 || localRng() < Math.min(0.30, 1200 / (matches + 1))) return randomPair(localRng)
    const pool = candidatePool(localRng)
    const ordered = pool.slice().sort((left, right) => ratingsCutline[right] - ratingsCutline[left])
    const poolCutIndex = Math.max(0, Math.min(ordered.length - 1, Math.ceil(k / n * ordered.length) - 1))
    const cut = ratingsCutline[ordered[poolCutIndex]]
    const uncertainty = (item) => 1 / Math.sqrt(gamesCutline[item] + 1)
    const localBand = pool.filter((item) => Math.abs(ratingsCutline[item] - cut) <= 2.5 * uncertainty(item))
    const candidates = localBand.length >= 2 ? localBand : ordered.slice(Math.max(0, poolCutIndex - 8), Math.min(ordered.length, poolCutIndex + 9))
    let bestPair = [candidates[0], candidates[1] ?? candidates[0]]
    let bestScore = -Infinity
    for (let leftIndex = 0; leftIndex < candidates.length; leftIndex += 1) {
      for (let rightIndex = leftIndex + 1; rightIndex < candidates.length; rightIndex += 1) {
        const left = candidates[leftIndex], right = candidates[rightIndex]
        const p = sigmoid(ratingsCutline[left] - ratingsCutline[right])
        const pairUncertainty = uncertainty(left) + uncertainty(right)
        const score = p * (1 - p) * pairUncertainty
        if (score > bestScore) { bestScore = score; bestPair = [left, right] }
      }
    }
    return bestPair
  }

  function play(ratings, games, left, right, localRng) {
    const leftWon = localRng() < sigmoid(skills[left] - skills[right])
    // A common step size keeps the update a symmetric Elo/BTL SGD step.
    eloUpdate(ratings, left, right, leftWon, 0.22)
    games[left] += 1
    games[right] += 1
  }

  function recall(ratings) {
    const estimated = topK(ratings, k)
    let hits = 0
    estimated.forEach((item) => { if (trueTop.has(item)) hits += 1 })
    return hits / k
  }

  function evaluate(force) {
    if (!force && matches % 1000 !== 0) return
    const randomRecall = recall(ratingsRandom)
    const cutlineRecall = recall(ratingsCutline)
    randomHistory.push([matches, randomRecall])
    cutlineHistory.push([matches, cutlineRecall])
    $('matches').textContent = matches.toLocaleString()
    $('recall').textContent = `${Math.round(cutlineRecall * 100)}%`
    $('target').textContent = `top ${k}`
    $('note').innerHTML = `After <b>${matches.toLocaleString()}</b> matches per policy: cutline-focused recall@${k} is <b>${Math.round(cutlineRecall * 100)}%</b>; random is ${Math.round(randomRecall * 100)}%. <strong>This is a transparent cutline-focused heuristic, not a claim to implement a provably optimal top-K identification algorithm.</strong> It uses early random exploration, a sampled band around the estimated K-th score, and BTL information ${'p(1-p)'} weighted by uncertainty.`
  }

  function advance(count) {
    const randomRng = mulberry32(1009 + matches * 3)
    const cutlineRng = mulberry32(9001 + matches * 5)
    for (let step = 0; step < count; step += 1) {
      const [randomLeft, randomRight] = randomPair(randomRng)
      play(ratingsRandom, gamesRandom, randomLeft, randomRight, randomRng)
      const [cutlineLeft, cutlineRight] = chooseCutlinePair(cutlineRng)
      play(ratingsCutline, gamesCutline, cutlineLeft, cutlineRight, cutlineRng)
      matches += 1
    }
    evaluate(false)
  }

  function draw() { drawRace(); drawScatter() }
  function drawRace() {
    const { context, width, height } = resizeCanvas($('race'), 240)
    const pad={left:34,right:12,top:14,bottom:22}, pw=width-pad.left-pad.right, ph=height-pad.top-pad.bottom
    context.strokeStyle='rgba(255,255,255,.08)';context.fillStyle='#9aa8bd';context.font='10px ui-monospace'
    for(let tick=0;tick<=4;tick+=1){const value=tick/4,y=pad.top+(1-value)*ph;context.beginPath();context.moveTo(pad.left,y);context.lineTo(pad.left+pw,y);context.stroke();context.fillText(`${Math.round(value*100)}%`,3,y+3)}
    const drawLine=(history,color)=>{if(history.length<2)return;context.strokeStyle=color;context.lineWidth=2;context.beginPath();history.forEach(([at,value],index)=>{const x=pad.left+at/Math.max(matches,1000)*pw,y=pad.top+(1-value)*ph;index?context.lineTo(x,y):context.moveTo(x,y)});context.stroke()}
    drawLine(randomHistory,'#8b95a8');drawLine(cutlineHistory,'#5fd2a3');context.fillStyle='#5fd2a3';context.fillText('cutline heuristic',width-130,pad.top+10);context.fillStyle='#8b95a8';context.fillText('random',width-130,pad.top+24);context.fillStyle='#9aa8bd';context.fillText(`matches: ${matches.toLocaleString()}`,pad.left+2,height-6)
  }
  function drawScatter() {
    const { context, width, height } = resizeCanvas($('scatter'), 240)
    const pad={left:30,right:10,top:12,bottom:20}, pw=width-pad.left-pad.right, ph=height-pad.top-pad.bottom
    let sMin=Infinity,sMax=-Infinity,rMin=Infinity,rMax=-Infinity
    sample.forEach((item)=>{sMin=Math.min(sMin,skills[item]);sMax=Math.max(sMax,skills[item]);rMin=Math.min(rMin,ratingsCutline[item]);rMax=Math.max(rMax,ratingsCutline[item])})
    if(rMax-rMin<1e-6)rMax=rMin+1
    const x=(value)=>pad.left+(value-sMin)/(sMax-sMin||1)*pw, y=(value)=>pad.top+(1-(value-rMin)/(rMax-rMin))*ph
    context.strokeStyle='rgba(255,255,255,.08)';context.strokeRect(pad.left,pad.top,pw,ph);context.strokeStyle='rgba(245,196,81,.6)';context.setLineDash([4,3]);context.beginPath();context.moveTo(x(trueCutline),pad.top);context.lineTo(x(trueCutline),pad.top+ph);context.stroke();context.setLineDash([])
    sample.forEach((item)=>{context.fillStyle=trueTop.has(item)?'#f5c451':'rgba(76,141,246,.48)';context.beginPath();context.arc(x(skills[item]),y(ratingsCutline[item]),trueTop.has(item)?2.2:1.3,0,2*Math.PI);context.fill()})
    context.fillStyle='#f5c451';context.font='10px ui-monospace';context.fillText(`true top-${k} cut`,x(trueCutline)+3,pad.top+10)
  }

  function loop() { if (!running) return; advance(150); draw(); frame=requestAnimationFrame(loop) }
  $('play').onclick=()=>{running=!running;$('play').textContent=running?'⏸ pause':'▶ run matches';if(running)loop()}
  $('step').onclick=()=>{running=false;$('play').textContent='▶ run matches';advance(1000);draw()}
  $('reset').onclick=reset
  $('k').onchange=(event)=>{k=Number(event.target.value);reset()}
  window.addEventListener('resize',draw)
  reset()
})()
</script>
<script>(function(){function h(){parent.postMessage({type:'demo-height',height:Math.ceil(document.documentElement.getBoundingClientRect().height)},'*')}addEventListener('load',()=>{h();setTimeout(h,250)});addEventListener('resize',h);if(window.ResizeObserver)new ResizeObserver(h).observe(document.body)})();</script>
</body>
</html>
