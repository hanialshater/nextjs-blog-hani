<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Top-K identification with overlapping BT leagues</title>
<style>
:root{--bg:#0b1220;--card:#131c30;--panel:#0e1626;--edge:#263552;--text:#e6edf3;--muted:#9aa8bd;--blue:#4c8df6;--green:#5fd2a3;--gold:#f5c451;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text)}body{padding:12px;font:14px/1.45 system-ui,-apple-system,Segoe UI,sans-serif}.root{padding:16px;background:var(--card);border:1px solid var(--edge);border-radius:14px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.stat{padding:8px 10px;background:var(--panel);border:1px solid var(--edge);border-radius:9px}.label{font:10px var(--mono);letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}.value{font:18px var(--mono);margin-top:3px}.controls{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:12px}.grid{display:grid;grid-template-columns:1.3fr 1fr;gap:12px;margin-top:12px}canvas{display:block;width:100%;height:240px;background:var(--panel);border:1px solid var(--edge);border-radius:9px}.caption{margin-top:3px;color:var(--muted);text-align:center;font:10px var(--mono)}button,select{padding:7px 9px;border:1px solid var(--edge);border-radius:7px;background:#1a2440;color:var(--text);font:12px var(--mono);cursor:pointer}button.primary{background:var(--blue);border-color:var(--blue);color:#06101d;font-weight:700}.note{margin-top:12px;padding:9px 10px;border:1px solid var(--edge);border-radius:9px;background:var(--panel);color:var(--muted);font-size:12px}.note b{color:var(--green)}.note strong{color:var(--gold)}@media(max-width:650px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr)}}
</style>
</head>
<body>
<div class="root">
  <div class="stats"><div class="stat"><div class="label">players</div><div class="value">5,000</div></div><div class="stat"><div class="label">target</div><div class="value" id="target">top 100</div></div><div class="stat"><div class="label">matches / policy</div><div class="value" id="matches">0</div></div><div class="stat"><div class="label">cutline recall</div><div class="value" id="recall">0%</div></div></div>
  <div class="controls"><button class="primary" id="play">▶ play</button><button id="step">+1,000</button><button id="jump">+10,000</button><button id="reset">new world</button><label>find <select id="k"><option value="10">top 10</option><option value="100" selected>top 100</option><option value="500">top 500</option></select></label></div>
  <div class="grid"><div><canvas id="race" height="240"></canvas><div class="caption">true top-K recovered by estimated top-K</div></div><div><canvas id="scatter" height="240"></canvas><div class="caption">bootstrap-Elo mean estimate; green = ensemble disagreement</div></div></div>
  <div class="note" id="note"></div>
</div>
<script src="./edp-core.js"></script>
<script>
(() => {
  const { eloUpdate, mulberry32, normal, resizeCanvas, sigmoid, topK } = window.EDP
  const N = 5000, ENSEMBLE = 10
  const $ = (id) => document.getElementById(id)
  let K = 100, worldRng, randomRng, adaptiveRng, modelRngs
  let skill, randomRating, randomGames, models, adaptiveGames, meanRating, membership, rank, order
  let trueTop, trueCut, matches, randomHistory, leagueHistory, running, frame, sample
  let coverageOrder, coveragePair, leagues, lastRefresh, pairCounts

  function push(heap, node) { heap.push(node); let i=heap.length-1; while(i>0){const p=(i-1)>>1;if(heap[p].score<=node.score)break;heap[i]=heap[p];i=p}heap[i]=node }
  function replaceMin(heap,node){let i=0;while(true){const l=i*2+1,r=l+1;if(l>=heap.length)break;const c=r<heap.length&&heap[r].score<heap[l].score?r:l;if(heap[c].score>=node.score)break;heap[i]=heap[c];i=c}heap[i]=node}
  function topKFast(scores,k){const heap=[];for(let i=0;i<scores.length;i++){const node={item:i,score:scores[i]};if(heap.length<k)push(heap,node);else if(node.score>heap[0].score)replaceMin(heap,node)}return heap.map(x=>x.item).sort((a,b)=>scores[b]-scores[a])}
  function shuffle(rng){const out=new Int32Array(N);for(let i=0;i<N;i++)out[i]=i;for(let i=N-1;i>0;i--){const j=Math.floor(rng()*(i+1));const x=out[i];out[i]=out[j];out[j]=x}return out}
  function expWeight(rng){return Math.min(2.5,-Math.log(Math.max(rng(),1e-10)))}
  function key(a,b){return Math.min(a,b)*N+Math.max(a,b)}
  function pairGames(a,b){return pairCounts.get(key(a,b))||0}
  function uncertainty(i){return membership[i]*(1-membership[i])+.08/Math.sqrt(adaptiveGames[i]+1)}

  function refreshPosterior(){
    meanRating.fill(0); membership.fill(0)
    for(let m=0;m<ENSEMBLE;m++){
      const scores=models[m]
      for(let i=0;i<N;i++)meanRating[i]+=scores[i]/ENSEMBLE
      if(matches>=N)topKFast(scores,K).forEach(i=>membership[i]+=1/ENSEMBLE)
    }
    if(matches<N)membership.fill(.5)
    order=Array.from({length:N},(_,i)=>i).sort((a,b)=>meanRating[b]-meanRating[a])
    for(let i=0;i<N;i++)rank[order[i]]=i
    buildLeagues();lastRefresh=matches
  }

  function buildLeagues(){
    const size=Math.max(72,Math.min(240,Math.ceil(Math.max(K*1.25,90)))),stride=Math.max(24,Math.floor(size*.48)),endLimit=Math.min(N,K+4*size)
    leagues=[]
    for(let start=0;start<endLimit;start+=stride){
      const end=Math.min(N,start+size),members=order.slice(start,end),entropy=members.reduce((s,i)=>s+membership[i]*(1-membership[i]),0),center=(start+end)/2
      const gate=.2+3*Math.exp(-Math.abs(center-K)/(size*.85))
      leagues.push({members,score:(entropy+.05)*gate})
    }
  }

  function sampleLeague(){let total=leagues.reduce((s,l)=>s+l.score,0),x=adaptiveRng()*total;for(const league of leagues){x-=league.score;if(x<=0)return league}return leagues.at(-1)}
  function coverageChoice(){if(coveragePair>=N/2){coverageOrder=shuffle(adaptiveRng);coveragePair=0}const a=coverageOrder[2*coveragePair],b=coverageOrder[2*coveragePair+1];coveragePair++;return[a,b]}
  function best(items,fn){let chosen=items[0],value=fn(chosen);for(let n=1;n<items.length;n++){const item=items[n],next=fn(item);if(next>value){chosen=item;value=next}}return chosen}

  function localPair(league,scores){
    const inside=league.members.filter(i=>rank[i]<K),outside=league.members.filter(i=>rank[i]>=K)
    if(inside.length&&outside.length){
      const incumbent=best(inside,i=>-scores[i]+.35*uncertainty(i))
      const challenger=best(outside,i=>scores[i]+.35*uncertainty(i))
      if(incumbent!==challenger)return[incumbent,challenger]
    }
    const sorted=league.members.slice().sort((a,b)=>scores[b]-scores[a]);let result=[sorted[0],sorted[1]],value=-Infinity
    for(let i=0;i<sorted.length-1;i++){
      const a=sorted[i],b=sorted[i+1],p=sigmoid(scores[a]-scores[b]),score=p*(1-p)*(uncertainty(a)+uncertainty(b))/Math.sqrt(pairGames(a,b)+1)
      if(score>value){value=score;result=[a,b]}
    }
    return result
  }

  function promotionPair(scores){
    const size=Math.max(72,Math.min(240,Math.ceil(Math.max(K*1.25,90))))
    const incumbents=order.slice(Math.max(0,K-30),Math.min(N,K+20)),outsiders=order.slice(Math.min(N,K+20),Math.min(N,K+size*3))
    return [best(incumbents,i=>-scores[i]+.4*uncertainty(i)),best(outsiders,i=>scores[i]+.5*uncertainty(i))]
  }

  function chooseAdaptive(){
    if(matches<N)return coverageChoice()
    if(lastRefresh<0||matches-lastRefresh>=250)refreshPosterior()
    const scores=models[Math.floor(adaptiveRng()*ENSEMBLE)]
    return adaptiveRng()<.16?promotionPair(scores):localPair(sampleLeague(),scores)
  }

  function updateEnsemble(a,b,aWon){
    for(let m=0;m<ENSEMBLE;m++)eloUpdate(models[m],a,b,aWon,.24*expWeight(modelRngs[m]))
    adaptiveGames[a]++;adaptiveGames[b]++;const k=key(a,b);pairCounts.set(k,(pairCounts.get(k)||0)+1)
  }
  function randomPair(){const a=Math.floor(randomRng()*N);let b=Math.floor(randomRng()*(N-1));if(b>=a)b++;return[a,b]}
  function playRandom(a,b){const aWon=randomRng()<sigmoid(skill[a]-skill[b]);eloUpdate(randomRating,a,b,aWon,.24);randomGames[a]++;randomGames[b]++}
  function playAdaptive(a,b){const aWon=adaptiveRng()<sigmoid(skill[a]-skill[b]);updateEnsemble(a,b,aWon)}
  function recall(scores){return topK(scores,K).filter(i=>trueTop.has(i)).length/K}

  function evaluate(force){
    if(!force&&matches%250)return
    if(lastRefresh<0)refreshPosterior()
    const randomRecall=recall(randomRating),leagueRecall=recall(meanRating)
    randomHistory.push([matches,randomRecall]);leagueHistory.push([matches,leagueRecall])
    $('target').textContent=`top ${K}`;$('matches').textContent=matches.toLocaleString();$('recall').textContent=`${Math.round(leagueRecall*100)}%`
    $('note').innerHTML=`After <b>${matches.toLocaleString()}</b> matches per policy: <b>overlapping bootstrap-Elo leagues</b> recover <b>${Math.round(leagueRecall*100)}%</b> of the true top-${K}; random recovers ${Math.round(randomRecall*100)}%. <strong>How it works:</strong> ten bootstrap-Elo worlds vote on top-${K} membership. The scheduler samples an overlapping league, then compares the sampled incumbent and challenger at that league’s local gate. Promotion matches give uncertain outsiders a route upward.`
  }

  function reset(){
    worldRng=mulberry32((Date.now()>>>0)||7);randomRng=mulberry32(1009);adaptiveRng=mulberry32(9001);modelRngs=Array.from({length:ENSEMBLE},(_,i)=>mulberry32(7001+97*i))
    skill=new Float32Array(N);for(let i=0;i<N;i++)skill[i]=normal(worldRng)
    const truth=topK(skill,K);trueTop=new Set(truth);trueCut=skill[truth[K-1]]
    randomRating=new Float32Array(N);randomGames=new Uint16Array(N);models=Array.from({length:ENSEMBLE},()=>new Float32Array(N));adaptiveGames=new Uint16Array(N);meanRating=new Float32Array(N);membership=new Float32Array(N);rank=new Int32Array(N);order=Array.from({length:N},(_,i)=>i)
    coverageOrder=shuffle(adaptiveRng);coveragePair=0;leagues=[];lastRefresh=-1;pairCounts=new Map();matches=0;randomHistory=[];leagueHistory=[];running=false;cancelAnimationFrame(frame);$('play').textContent='▶ play';sample=Array.from({length:600},()=>Math.floor(worldRng()*N));refreshPosterior();evaluate(true);draw()
  }

  function advance(count){for(let i=0;i<count;i++){const r=randomPair();playRandom(...r);const a=chooseAdaptive();playAdaptive(...a);matches++}evaluate(false)}
  function drawRace(){const{context:c,width:w,height:h}=resizeCanvas($('race'),240),p={l:34,r:12,t:14,b:22},pw=w-p.l-p.r,ph=h-p.t-p.b;c.strokeStyle='rgba(255,255,255,.08)';c.fillStyle='#9aa8bd';c.font='10px ui-monospace';for(let i=0;i<=4;i++){const v=i/4,y=p.t+(1-v)*ph;c.beginPath();c.moveTo(p.l,y);c.lineTo(p.l+pw,y);c.stroke();c.fillText(`${Math.round(v*100)}%`,3,y+3)}const line=(history,color)=>{if(history.length<2)return;c.strokeStyle=color;c.lineWidth=2;c.beginPath();history.forEach(([at,v],i)=>{const x=p.l+at/Math.max(matches,250)*pw,y=p.t+(1-v)*ph;i?c.lineTo(x,y):c.moveTo(x,y)});c.stroke()};line(randomHistory,'#8b95a8');line(leagueHistory,'#5fd2a3');c.fillStyle='#5fd2a3';c.fillText('overlapping BT leagues',w-146,p.t+10);c.fillStyle='#8b95a8';c.fillText('random',w-146,p.t+24);c.fillStyle='#9aa8bd';c.fillText(`matches / policy: ${matches.toLocaleString()}`,p.l+2,h-6)}
  function drawScatter(){const{context:c,width:w,height:h}=resizeCanvas($('scatter'),240),p={l:30,r:10,t:12,b:20},pw=w-p.l-p.r,ph=h-p.t-p.b;let s0=Infinity,s1=-Infinity,r0=Infinity,r1=-Infinity;sample.forEach(i=>{s0=Math.min(s0,skill[i]);s1=Math.max(s1,skill[i]);r0=Math.min(r0,meanRating[i]);r1=Math.max(r1,meanRating[i])});if(r1-r0<1e-6)r1=r0+1;const x=v=>p.l+(v-s0)/(s1-s0||1)*pw,y=v=>p.t+(1-(v-r0)/(r1-r0))*ph;c.strokeStyle='rgba(255,255,255,.08)';c.strokeRect(p.l,p.t,pw,ph);c.strokeStyle='rgba(245,196,81,.6)';c.setLineDash([4,3]);c.beginPath();c.moveTo(x(trueCut),p.t);c.lineTo(x(trueCut),p.t+ph);c.stroke();c.setLineDash([]);sample.forEach(i=>{const q=membership[i];c.fillStyle=trueTop.has(i)?'#f5c451':q>.08&&q<.92?'#5fd2a3':'rgba(76,141,246,.48)';c.beginPath();c.arc(x(skill[i]),y(meanRating[i]),trueTop.has(i)?2.2:1.3,0,2*Math.PI);c.fill()});c.fillStyle='#f5c451';c.font='10px ui-monospace';c.fillText(`true top-${K} cut`,x(trueCut)+3,p.t+10)}
  function draw(){drawRace();drawScatter()}
  function loop(){if(!running)return;advance(100);draw();frame=requestAnimationFrame(loop)}
  $('play').onclick=()=>{running=!running;$('play').textContent=running?'⏸ pause':'▶ play';if(running)loop()};$('step').onclick=()=>{running=false;$('play').textContent='▶ play';advance(1000);draw()};$('jump').onclick=()=>{running=false;$('play').textContent='▶ play';advance(10000);draw()};$('reset').onclick=reset;$('k').onchange=e=>{K=Number(e.target.value);reset()};addEventListener('resize',draw);reset()
})()
</script>
<script>(function(){function h(){parent.postMessage({type:'demo-height',height:Math.ceil(document.documentElement.getBoundingClientRect().height)},'*')}addEventListener('load',()=>{h();setTimeout(h,250)});addEventListener('resize',h);if(window.ResizeObserver)new ResizeObserver(h).observe(document.body)})();</script>
</body></html>
