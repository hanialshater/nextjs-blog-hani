<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pitch-Match — league table from noisy 1v1 matches</title>
<style>
:root{--bg:#0b1220;--card:#131c30;--card2:#1a2440;--fg:#e6edf3;--dim:#8b95a8;--faint:#5b6378;--accent:#4c8df6;--accent2:#2a4a7a;--good:#5fd2a3;--warn:#f0a058;--bad:#e16c6c;--gold:#f5c451;--purple:#c879f0;--border:#1f2a44;--code:#0e1626;--mono:ui-monospace,Menlo,Monaco,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",Inter,Roboto,sans-serif}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--fg)}
body{font-family:var(--sans);font-size:15px;line-height:1.5;padding:12px}
button{font-family:var(--mono);font-size:13px;background:var(--card2);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:7px 13px;cursor:pointer;transition:all .12s}
button:hover{background:var(--accent2);border-color:var(--accent)}
button.primary{background:var(--accent);color:#0b1220;border-color:var(--accent);font-weight:600}
canvas{display:block;width:100%;background:var(--code);border-radius:6px}
/* ---- pitch-match component (scoped .pm-) ---- */
.pm-root{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;font-family:var(--sans);color:var(--fg)}
.pm-counters{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;font-family:var(--mono)}
.pm-counter{background:var(--code);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.pm-counter .k{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.pm-counter .v{font-size:18px;color:var(--fg);margin-top:2px}
.pm-counter .v small{font-size:11px;color:var(--dim)}
.pm-main{display:grid;grid-template-columns:1.35fr 1fr;gap:14px}
@media(max-width:680px){.pm-main{grid-template-columns:1fr}.pm-counters{grid-template-columns:repeat(2,1fr)}}
.pm-pitchwrap{position:relative}
.pm-pitch{display:block;width:100%;border-radius:10px;background:#15692f}
.pm-banner{position:absolute;left:50%;top:10px;transform:translateX(-50%);background:rgba(8,14,24,.82);border:1px solid var(--border);border-radius:999px;padding:5px 14px;font-family:var(--mono);font-size:12px;color:var(--fg);white-space:nowrap}
.pm-banner b{color:var(--gold)}
.pm-board{background:var(--code);border:1px solid var(--border);border-radius:10px;padding:8px}
.pm-board h3{margin:2px 4px 8px;font-size:11px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between}
.pm-row{display:grid;grid-template-columns:22px 1fr auto;gap:8px;align-items:center;padding:5px 4px;border-radius:7px;transition:background .25s}
.pm-row.playing{background:rgba(76,141,246,.12)}
.pm-rank{font-family:var(--mono);font-size:13px;color:var(--dim);text-align:right}
.pm-rank.up{color:var(--good)}.pm-rank.down{color:var(--bad)}
.pm-who{min-width:0}
.pm-name{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 1px rgba(0,0,0,.4)}
.pm-bar{height:6px;background:#0b1220;border-radius:3px;margin-top:4px;overflow:hidden}
.pm-bar>i{display:block;height:100%;border-radius:3px;transition:width .45s cubic-bezier(.3,.8,.3,1)}
.pm-meta{font-family:var(--mono);font-size:10.5px;color:var(--dim);text-align:right;line-height:1.3}
.pm-meta .true{color:var(--gold)}
.pm-meta .ok{color:var(--good)}.pm-meta .no{color:var(--bad)}
.pm-controls{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:12px}
.pm-controls button{font-size:12.5px;padding:7px 12px}
.pm-controls button.primary{background:var(--accent);color:#0b1220;border-color:var(--accent);font-weight:600}
.pm-controls select{font-family:var(--mono);font-size:12.5px;background:var(--card2);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:6px 9px}
.pm-controls label{font-family:var(--mono);font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px}
.pm-why{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:8px;min-height:15px}
.pm-why b{color:var(--accent)}
.pm-tau{display:block;width:100%;height:88px;background:var(--code);border:1px solid var(--border);border-radius:8px;margin-top:12px}
</style>
</head>
<body>
<div id="sortHero"></div>
<script>
// ============ shared pure logic ============
const COLORS={blue:'#4c8df6',green:'#5fd2a3',orange:'#f0a058',purple:'#c879f0',red:'#e16c6c',gold:'#f5c451',dim:'#8b95a8',fg:'#e6edf3'};
function rng(seed){let s=seed|0||1;return function(){s=(s+0x6D2B79F5)|0;let t=s;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;};}
function sigmoid(x){return 1/(1+Math.exp(-x));}
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function kendallTau(rA,rB){const n=rA.length;let c=0,d=0;for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){const a=Math.sign(rA[i]-rA[j]),b=Math.sign(rB[i]-rB[j]);if(a*b>0)c++;else if(a*b<0)d++;}const t=n*(n-1)/2;return t?(c-d)/t:1;}
function ranksFromScores(sc){const idx=[...sc.keys()].sort((a,b)=>sc[b]-sc[a]);const r=new Array(sc.length);idx.forEach((v,k)=>r[v]=k);return r;}
function bradleyTerry(wins,iters=80){const n=wins.length,W=new Array(n).fill(0),G=Array.from({length:n},()=>new Array(n).fill(0));for(let i=0;i<n;i++)for(let j=0;j<n;j++){W[i]+=wins[i][j];const g=wins[i][j]+wins[j][i];G[i][j]=g;G[j][i]=g;}let p=new Array(n).fill(1);for(let it=0;it<iters;it++){const np=new Array(n);for(let i=0;i<n;i++){let den=0;for(let j=0;j<n;j++){if(j!==i&&G[i][j]>0)den+=G[i][j]/(p[i]+p[j]);}np[i]=den>0?(W[i]+0.5)/den:p[i];}let ls=0;for(let i=0;i<n;i++)ls+=Math.log(np[i]);const gm=Math.exp(ls/n);for(let i=0;i<n;i++)p[i]=np[i]/gm;}return p.map(v=>Math.log(v));}
function playMatch(skill,i,j,beta,rand){return rand()<sigmoid(beta*(skill[i]-skill[j]))?i:j;}
function pickPair(policy,state,rand){
  const {n,games,estRank}=state;
  const allPairs=[];for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)allPairs.push([i,j]);
  if(policy==='random'){return allPairs[(rand()*allPairs.length)|0];}
  if(policy==='roundrobin'){let best=allPairs[0],bn=Infinity;for(const[i,j]of allPairs){if(games[i][j]<bn){bn=games[i][j];best=[i,j];}}return best;}
  if(policy==='ladder'){const adj=[];for(let i=0;i<n;i++)for(let j=0;j<n;j++)if(estRank[j]-estRank[i]===1)adj.push([i,j]);if(!adj.length)return allPairs[(rand()*allPairs.length)|0];let best=adj[0],bn=Infinity;for(const[i,j]of adj){const g=games[i][j];if(g<bn){bn=g;best=[i,j];}}return best;}
  if(policy==='active'){let best=allPairs[0],bs=-Infinity;for(const[i,j]of allPairs){const rankGap=Math.abs(estRank[i]-estRank[j]);const s=0.6/(1+rankGap)+0.4/(1+games[i][j]);if(s>bs){bs=s;best=[i,j];}}return best;}
  return allPairs[0];
}
const ROSTER=[
  {name:'Ada',short:'AD',color:'#4c8df6'},{name:'Bruno',short:'BR',color:'#5fd2a3'},
  {name:'Cruz',short:'CR',color:'#f0a058'},{name:'Dembe',short:'DE',color:'#c879f0'},
  {name:'Enzo',short:'EN',color:'#e16c6c'},{name:'Frida',short:'FR',color:'#ff7eb6'},
  {name:'Goro',short:'GO',color:'#f5c451'},{name:'Hana',short:'HA',color:'#7ee0d0'},
];

// ============ pitch-match component ============
function mountPitchMatch(root, opts){
  opts=opts||{};
  const N=ROSTER.length;
  const BETA=opts.beta||1.15;
  const seed0=opts.seed||7;
  let R, players, trueSkill, trueRank, wins, games, totGames, estSkill, estRank, lastRank;
  let nMatches=0, tauHist=[], revealed=false, playing=false, policy=opts.policy||'ladder';
  let anim=null;            // {i,j,winner, t0, dur, committed}
  let speed=1.4, raf=null, lastWhy='';
  let selected=[];          // scout mode: clicked players awaiting a match
  let lockTarget=1, lockedPick=null;  // your nominated top-k at lock time

  function reset(seed){
    R=rng(seed);
    // distinct hidden skills, spread, then shuffled onto the roster
    const base=[]; for(let i=0;i<N;i++) base.push(1.8 - 3.6*i/(N-1));
    for(let i=N-1;i>0;i--){const k=(R()*(i+1))|0;[base[i],base[k]]=[base[k],base[i]];}
    players=ROSTER.map((p,i)=>({...p, idx:i}));
    trueSkill=base.slice();
    trueRank=ranksFromScores(trueSkill);
    wins=Array.from({length:N},()=>new Array(N).fill(0));
    games=Array.from({length:N},()=>new Array(N).fill(0));
    totGames=new Array(N).fill(0);
    estSkill=new Array(N).fill(0);
    estRank=[...Array(N).keys()];   // arbitrary start
    lastRank=estRank.slice();
    nMatches=0; tauHist=[]; anim=null; revealed=false; lastWhy='';
    selected=[]; lockedPick=null;
    recompute(); buildBoard(); drawTau();
  }

  function recompute(){
    estSkill=bradleyTerry(wins);
    lastRank=estRank.slice();
    estRank=ranksFromScores(estSkill);
  }
  function confidentPairs(){
    let c=0;for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
      const se=1/Math.sqrt(totGames[i]+1)+1/Math.sqrt(totGames[j]+1);
      if(Math.abs(estSkill[i]-estSkill[j])>1.0*se)c++;
    }return c;
  }
  function curTau(){return kendallTau(estRank,trueRank);}

  function commitMatch(i,j,winner){
    const loser=winner===i?j:i;
    wins[winner][loser]++; games[i][j]++; games[j][i]++; totGames[i]++; totGames[j]++;
    nMatches++;
    recompute();
    tauHist.push(curTau());
  }

  // ---- DOM scaffold ----
  root.classList.add('pm-root');
  root.innerHTML=`
   <div class="pm-counters">
     <div class="pm-counter"><div class="k">matches played</div><div class="v" data-c="m">0</div></div>
     <div class="pm-counter"><div class="k">table correctness τ</div><div class="v" data-c="tau">0.00</div></div>
     <div class="pm-counter"><div class="k">pairs settled</div><div class="v" data-c="conf">0 <small>/ ${N*(N-1)/2}</small></div></div>
     <div class="pm-counter"><div class="k">top of table</div><div class="v" data-c="lead">—</div></div>
   </div>
   <div class="pm-main">
     <div class="pm-pitchwrap">
       <canvas class="pm-pitch" height="300"></canvas>
       <div class="pm-banner" data-c="banner">kick-off</div>
     </div>
     <div class="pm-board">
       <h3><span>league table</span><span data-c="src">Bradley-Terry est.</span></h3>
       <div data-c="rows"></div>
     </div>
   </div>
   <div class="pm-controls">
     <button class="primary" data-c="play">▶ play</button>
     <button data-c="one">+1 match</button>
     <button data-c="fifty">+50 (instant)</button>
     <button data-c="reveal">reveal true skill</button>
     <button data-c="reset">reset (new league)</button>
     <label>scheduler
       <select data-c="policy">
         <option value="manual">you scout (click 2)</option>
         <option value="random">random draw</option>
         <option value="roundrobin">round-robin</option>
         <option value="ladder" selected>ladder (adjacent)</option>
         <option value="active">active (boundary)</option>
       </select>
     </label>
     <label>find <select data-c="target"><option value="1">the #1</option><option value="3">top 3</option></select></label>
     <button data-c="lock">lock my pick</button>
     <label>speed <input type="range" min="0.5" max="4" step="0.1" value="1.4" data-c="speed" style="width:80px"></label>
   </div>
   <div class="pm-why" data-c="why"></div>
   <canvas class="pm-tau"></canvas>`;

  const $=s=>root.querySelector(`[data-c="${s}"]`);
  const pitch=root.querySelector('.pm-pitch'), tau=root.querySelector('.pm-tau');
  $('policy').value=policy;

  // ---- leaderboard ----
  function buildBoard(){
    const order=[...Array(N).keys()].sort((a,b)=>estRank[a]-estRank[b]);
    const sMin=Math.min(...estSkill), sMax=Math.max(...estSkill), span=(sMax-sMin)||1;
    const rows=order.map(idx=>{
      const p=players[idx], rank=estRank[idx], moved=lastRank[idx]-rank;
      const w=clamp((estSkill[idx]-sMin)/span,0.02,1);
      const wl=(()=>{let win=0,los=0;for(let k=0;k<N;k++){win+=wins[idx][k];los+=wins[k][idx];}return `${win}-${los}`;})();
      const arrow=moved>0?'<span class="pm-rank up">▲</span>':moved<0?'<span class="pm-rank down">▼</span>':'';
      let truth='';
      if(revealed){const ok=rank===trueRank[idx];truth=`<div class="true">true #${trueRank[idx]+1} <span class="${ok?'ok':'no'}">${ok?'✓':'✗'}</span></div>`;}
      const sel=selected.includes(idx)?' playing':'';
      const pick=(lockedPick&&lockedPick.includes(idx))?'<span style="color:var(--accent)"> ◆ your pick</span>':'';
      return `<div class="pm-row${sel}" data-row="${idx}"${policy==='manual'?' style="cursor:pointer"':''}>
        <div class="pm-rank">${rank+1}${arrow}</div>
        <div class="pm-who">
          <div class="pm-name"><span class="pm-dot" style="background:${p.color}"></span>${p.name}${pick}</div>
          <div class="pm-bar"><i style="width:${(w*100).toFixed(1)}%;background:${p.color}"></i></div>
        </div>
        <div class="pm-meta">${wl} gp${totGames[idx]}${truth}</div>
      </div>`;
    }).join('');
    $('rows').innerHTML=rows;
    if(policy==='manual'){
      root.querySelectorAll('.pm-row').forEach(r=>{r.onclick=()=>onScoutClick(+r.dataset.row);});
    }
    // counters
    $('m').textContent=nMatches;
    $('tau').textContent=curTau().toFixed(2);
    $('conf').innerHTML=`${confidentPairs()} <small>/ ${N*(N-1)/2}</small>`;
    const leadIdx=order[0];
    $('lead').textContent=players[leadIdx].name;
    $('src').textContent=revealed?'truth revealed':'Bradley-Terry est.';
  }
  function highlightPlaying(i,j){
    root.querySelectorAll('.pm-row').forEach(r=>r.classList.remove('playing'));
    if(i!=null){const a=root.querySelector(`[data-row="${i}"]`),b=root.querySelector(`[data-row="${j}"]`);if(a)a.classList.add('playing');if(b)b.classList.add('playing');}
  }

  // ---- pitch drawing ----
  function drawPitch(now){
    const dpr=window.devicePixelRatio||1, W=pitch.clientWidth||520, H=210;
    if(pitch.width!==W*dpr){pitch.width=W*dpr;pitch.height=H*dpr;}
    pitch.style.height=H+'px';
    const c=pitch.getContext('2d');c.setTransform(dpr,0,0,dpr,0,0);
    // grass stripes
    const stripes=7;for(let s=0;s<stripes;s++){c.fillStyle=s%2?'#15692f':'#19743a';c.fillRect(s*W/stripes,0,W/stripes+1,H);}
    c.strokeStyle='rgba(230,245,235,.55)';c.lineWidth=2;
    c.strokeRect(8,8,W-16,H-16);
    c.beginPath();c.moveTo(W/2,8);c.lineTo(W/2,H-8);c.stroke();
    c.beginPath();c.arc(W/2,H/2,30,0,7);c.stroke();
    // goals + boxes
    c.strokeRect(8,H/2-34,30,68);c.strokeRect(W-38,H/2-34,30,68);
    c.fillStyle='rgba(230,245,235,.85)';c.fillRect(4,H/2-22,5,44);c.fillRect(W-9,H/2-22,5,44);

    // token + ball positions
    let bx=W/2,by=H/2, wx=W/2-26,wy=H/2, lx=W/2+26,ly=H/2, wIdx=null,lIdx=null,flash=0;
    if(anim){
      const t=clamp((now-anim.t0)/anim.dur,0,1);
      wIdx=anim.winner; lIdx=anim.winner===anim.i?anim.j:anim.i;
      const goalRight=true; // winner always attacks right goal for legibility
      const gx=W-26, gy=H/2;
      const travel=clamp(t/0.78,0,1), ease=travel<.5?2*travel*travel:1-Math.pow(-2*travel+2,2)/2;
      bx=W/2 + (gx-W/2)*ease; by=H/2 + Math.sin(travel*Math.PI)*(anim.curve||18);
      wx=bx-16; wy=by+ (anim.curve>0?-8:8);
      lx=W/2-10 + (gx-W/2)*ease*0.72; ly=H/2 - (anim.curve>0?-10:10);
      if(t>0.78){flash=Math.sin((t-0.78)/0.22*Math.PI);bx=gx;by=gy;wx=gx-22;wy=gy;}
    }
    // ball trail
    if(anim){c.strokeStyle='rgba(255,255,255,.25)';c.lineWidth=2;c.beginPath();c.moveTo(W/2,H/2);c.lineTo(bx,by);c.stroke();}
    // goal flash
    if(flash>0){c.fillStyle=`rgba(245,196,81,${0.4*flash})`;c.fillRect(W-44,H/2-40,40,80);}
    // goalkeepers: track the ball's y, the right keeper dives the wrong way on a goal
    function keeper(gx,attacked){
      let ky=H/2 + clamp((by-H/2)*0.55,-26,26);
      if(attacked&&flash>0){ky=H/2 - Math.sign(by-H/2||1)*26*flash;} // dives wrong way
      c.beginPath();c.arc(gx,ky,8,0,7);c.fillStyle='#21314f';c.fill();
      c.lineWidth=2;c.strokeStyle='rgba(230,245,235,.85)';c.stroke();
      c.beginPath();c.moveTo(gx-7,ky-1);c.lineTo(gx+7,ky-1);c.stroke(); // arms
    }
    keeper(W-26,true);   // right goal (the one being attacked)
    keeper(26,false);    // left goal
    // tokens
    function token(x,y,idx,big){if(idx==null)return;const p=players[idx];c.beginPath();c.arc(x,y,big?15:13,0,7);c.fillStyle=p.color;c.fill();c.lineWidth=2.5;c.strokeStyle=big&&flash>0?'#fff':'rgba(8,14,24,.8)';c.stroke();c.fillStyle='#0b1220';c.font='bold 11px '+'ui-monospace,monospace';c.textAlign='center';c.textBaseline='middle';c.fillText(p.short,x,y+0.5);}
    token(lx,ly,lIdx,false);
    token(wx,wy,wIdx,true);
    // ball
    c.beginPath();c.arc(bx,by,6,0,7);c.fillStyle='#fff';c.fill();c.lineWidth=1;c.strokeStyle='#222';c.stroke();
    if(!anim){c.fillStyle='rgba(230,245,235,.7)';c.font='12px ui-monospace,monospace';c.textAlign='center';c.fillText(nMatches?'next match…':'press play',W/2,H-20);}
  }

  // ---- tau sparkline ----
  function drawTau(){
    const dpr=window.devicePixelRatio||1,W=tau.clientWidth||520,H=88;
    if(tau.width!==W*dpr){tau.width=W*dpr;tau.height=H*dpr;}
    tau.style.height=H+'px';
    const c=tau.getContext('2d');c.setTransform(dpr,0,0,dpr,0,0);c.clearRect(0,0,W,H);
    const pl=34,pr=10,pt=10,pb=16,pw=W-pl-pr,ph=H-pt-pb;
    c.strokeStyle='rgba(255,255,255,.06)';c.fillStyle=COLORS.dim;c.font='10px ui-monospace,monospace';
    [0,0.5,1].forEach(v=>{const y=pt+(1-v)*ph;c.beginPath();c.moveTo(pl,y);c.lineTo(pl+pw,y);c.stroke();c.fillText(v.toFixed(1),6,y+3);});
    c.fillText('Kendall τ vs true table',pl+2,H-3);
    if(tauHist.length<2)return;
    const xmax=Math.max(tauHist.length-1,1);
    c.strokeStyle=COLORS.green;c.lineWidth=2;c.beginPath();
    tauHist.forEach((v,i)=>{const x=pl+i/xmax*pw,y=pt+(1-clamp((v+ .2)/1.2,0,1))*ph;i?c.lineTo(x,y):c.moveTo(x,y);});
    c.stroke();
    const last=tauHist[tauHist.length-1];c.fillStyle=COLORS.green;c.textAlign='right';c.fillText('τ='+last.toFixed(2),W-pr-2,pt+10);c.textAlign='left';
  }

  // ---- match orchestration ----
  function startMatch(){
    const state={n:N,games,estRank,totGames};
    const [i,j]=pickPair(policy,state,R);
    const winner=playMatch(trueSkill,i,j,BETA,R);
    anim={i,j,winner,t0:performance.now(),dur:1000/speed,curve:R()<.5?18:-18,committed:false};
    highlightPlaying(i,j);
    const why={random:'random draw',roundrobin:'fewest games so far',ladder:'adjacent on the table — the boundary',active:'closest skills, least played — most uncertain order'}[policy];
    lastWhy=`pairing <b>${players[i].name}</b> vs <b>${players[j].name}</b> — ${why}`;
    $('why').innerHTML=lastWhy;
    $('banner').innerHTML=`${players[i].name} <span style="color:var(--dim)">vs</span> ${players[j].name}`;
  }
  function finishMatch(){
    commitMatch(anim.i,anim.j,anim.winner);
    const w=players[anim.winner];
    $('banner').innerHTML=`<b>${w.name}</b> scores! ⚽`;
    buildBoard(); drawTau();
    anim=null; highlightPlaying(null);
  }
  function instant(n){
    if(anim){finishMatch();}
    for(let k=0;k<n;k++){const st={n:N,games,estRank,totGames};const[i,j]=pickPair(policy,st,R);const win=playMatch(trueSkill,i,j,BETA,R);commitMatch(i,j,win);}
    buildBoard(); drawTau();
  }

  function loop(now){
    if(anim){
      const t=(now-anim.t0)/anim.dur;
      drawPitch(now);
      if(t>=1 && !anim.committed){anim.committed=true;finishMatch();if(playing&&policy!=='manual'){setTimeout(()=>{if(playing){startMatch();}},180/speed);}}
    }else{drawPitch(now);}
    raf=requestAnimationFrame(loop);
  }

  // ---- scout (manual) mode ----
  function startSpecificMatch(i,j){
    const winner=playMatch(trueSkill,i,j,BETA,R);
    anim={i,j,winner,t0:performance.now(),dur:1000/speed,curve:R()<.5?18:-18,committed:false};
    highlightPlaying(i,j);
    $('banner').innerHTML=`${players[i].name} <span style="color:var(--dim)">vs</span> ${players[j].name}`;
  }
  function onScoutClick(idx){
    if(policy!=='manual')return;
    if(anim)finishMatch();
    const at=selected.indexOf(idx);
    if(at>=0){selected.splice(at,1);}            // click again to deselect
    else if(selected.length<2){selected.push(idx);}
    if(selected.length===2){const[i,j]=selected;selected=[];playing=false;$('play').textContent='▶ play';buildBoard();startSpecificMatch(i,j);}
    else{buildBoard();$('why').innerHTML=selected.length?`pick an opponent for <b>${players[selected[0]].name}</b>`:'you are the scout — click two players to stage a match';}
  }
  function scoutVerdict(){
    const k=lockTarget;
    const estTopK=[...Array(N).keys()].filter(i=>estRank[i]<k);
    const trueTopK=new Set([...Array(N).keys()].filter(i=>trueRank[i]<k));
    lockedPick=estTopK.slice();
    const hits=estTopK.filter(i=>trueTopK.has(i)).length;
    revealed=true;$('reveal').textContent='hide true skill';
    const ok=hits===k;
    $('why').innerHTML=`you locked the ${k===1?'#1':'top '+k} after <b>${nMatches}</b> matches — <span style="color:${ok?'var(--good)':'var(--bad)'}">${hits}/${k} correct${ok?' ✓':''}</span>. Reveal shows the truth.`;
    buildBoard();
  }

  // ---- controls ----
  function manualHint(){$('why').innerHTML='you are the scout — click two players to stage a match';}
  $('play').onclick=()=>{if(policy==='manual'){manualHint();return;}playing=!playing;$('play').textContent=playing?'⏸ pause':'▶ play';if(playing&&!anim)startMatch();};
  $('one').onclick=()=>{if(policy==='manual'){manualHint();return;}playing=false;$('play').textContent='▶ play';if(anim)finishMatch();startMatch();/*let loop finish it*/setTimeout(()=>{if(anim&&!anim.committed){anim.t0=performance.now()-anim.dur;}},0);};
  $('fifty').onclick=()=>{playing=false;$('play').textContent='▶ play';instant(50);};
  $('reveal').onclick=()=>{revealed=!revealed;$('reveal').textContent=revealed?'hide true skill':'reveal true skill';buildBoard();};
  $('reset').onclick=()=>{playing=false;$('play').textContent='▶ play';reset((Date.now()&0xffff)+1);if(policy==='manual')manualHint();};
  $('policy').onchange=e=>{policy=e.target.value;playing=false;$('play').textContent='▶ play';selected=[];lockedPick=null;if(anim)finishMatch();buildBoard();if(policy==='manual')manualHint();else $('why').innerHTML='';};
  $('target').onchange=e=>{lockTarget=parseInt(e.target.value);};
  $('lock').onclick=()=>{if(anim)finishMatch();scoutVerdict();};
  $('speed').oninput=e=>{speed=parseFloat(e.target.value);};
  window.addEventListener('resize',()=>{buildBoard&&drawTau();});

  reset(seed0);
  raf=requestAnimationFrame(loop);
  if(policy==='manual')manualHint();
  if(opts.autoplay&&policy!=='manual'){playing=true;$('play').textContent='⏸ pause';startMatch();}
  return {api:{reset,instant,scout:onScoutClick,lock:scoutVerdict,play:()=>{if(policy!=='manual'&&!playing){playing=true;$('play').textContent='⏸ pause';if(!anim)startMatch();}},state:()=>({nMatches,tau:curTau(),estRank,trueRank,lockedPick})}};
}

mountPitchMatch(document.getElementById('sortHero'),{autoplay:true,seed:7});
</script>

/* report content height to the embedding page so the iframe can auto-size */
(function(){
  if(window.parent===window)return;
  function postHeight(){var h=Math.ceil(document.documentElement.getBoundingClientRect().height);window.parent.postMessage({type:'demo-height',height:h},'*');}
  window.addEventListener('load',function(){postHeight();setTimeout(postHeight,250);setTimeout(postHeight,700);});
  window.addEventListener('resize',postHeight);
  if(window.ResizeObserver){try{new ResizeObserver(postHeight).observe(document.body);}catch(e){}}
})();
</script>
