<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pull the bandit by hand</title>
<style>
:root{--bg:#0b1220;--card:#131c30;--card2:#1a2440;--fg:#e6edf3;--dim:#8b95a8;--faint:#5b6378;--accent:#4c8df6;--accent2:#2a4a7a;--good:#5fd2a3;--warn:#f0a058;--bad:#e16c6c;--purple:#c879f0;--border:#1f2a44;--code:#0e1626;--mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",Inter,Roboto,sans-serif}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--fg)}
body{font-family:var(--sans);font-size:15px;line-height:1.5;padding:12px}
.widget{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:0}
.legend{font-size:13px;color:var(--dim);margin-bottom:14px}
button{font-family:var(--mono);font-size:13px;background:var(--card2);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:7px 13px;cursor:pointer;transition:all 0.12s}
button:hover{background:var(--accent2);border-color:var(--accent)}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:14px 0 18px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:14px 0;font-family:var(--mono);font-size:13px}
.stat{background:var(--code);padding:9px 11px;border-radius:6px}
.stat .label{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:0.08em}
.stat .value{color:var(--fg);font-size:17px;margin-top:3px}
canvas{display:block;width:100%;background:var(--code);border-radius:6px}
.arms{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;margin-bottom:12px}
.arm{background:var(--code);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:border-color 0.12s,transform 0.08s}
.arm:hover{border-color:var(--accent)}
.arm:active{transform:scale(0.98)}
.arm .top{font-family:var(--mono);font-size:10.5px;color:var(--dim);display:flex;justify-content:space-between;gap:6px;margin-bottom:6px}
.arm .name{color:var(--fg);font-weight:600;font-size:11.5px;line-height:1.25}
.arm .tag{font-family:var(--mono);font-size:10.5px;color:var(--dim);line-height:1.3;min-height:28px}
.arm-icon{display:block;width:38px;height:30px;margin:2px 0 6px}
.arm .bar{height:5px;background:var(--bg);border-radius:3px;margin:6px 0;overflow:hidden;position:relative}
.arm .bar > div{height:100%;border-radius:3px;transition:width 0.2s}
.arm .mu{font-family:var(--mono);font-size:13px;color:var(--fg);margin-top:2px}
.arm .true{font-family:var(--mono);font-size:10.5px;color:var(--good);margin-top:2px}
.arm.star{border-color:var(--good)}
@media (max-width:600px){.arms{grid-template-columns:repeat(2,1fr)}}
@media (max-width:430px){.arms{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="widget">
<p class="legend">Same restaurants. Click a place to eat there tonight. The estimates update; the regret line accumulates. Try a hundred dinners by hand — see how well your intuition does against a Thompson-sampling bot eating in parallel.</p>
<div class="arms" id="arms"></div>
<div class="controls">
  <button id="reveal">reveal true means</button>
  <button id="manreset">reset</button>
</div>
<div class="stats">
  <div class="stat"><div class="label">dinners</div><div class="value" id="mpulls">0</div></div>
  <div class="stat"><div class="label">your regret</div><div class="value" id="mregret">0.00</div></div>
  <div class="stat"><div class="label">Thompson regret</div><div class="value" id="botregret">0.00</div></div>
  <div class="stat"><div class="label">bot picked</div><div class="value" id="botpick">—</div></div>
</div>
<canvas id="mancanvas" height="160"></canvas>
</div>
<script>
// ============ shared lib ============
const COLORS={blue:'#4c8df6',green:'#5fd2a3',orange:'#f0a058',purple:'#c879f0',red:'#e16c6c',dim:'#8b95a8',faint:'#3a4358',fg:'#e6edf3',bg:'#0e1626'};
function rng(seed){let s=seed|0||1;return function(){s=(s+0x6D2B79F5)|0;let t=s;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;};}
function gauss(rand){let u=rand()||1e-12,v=rand();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function gammaSample(shape,rand){
  if(shape<1){const u=Math.max(rand(),1e-12);return gammaSample(shape+1,rand)*Math.pow(u,1/shape);}
  const d=shape-1/3,c=1/Math.sqrt(9*d);
  while(true){let x=gauss(rand),v=1+c*x;if(v<=0)continue;v=v*v*v;const u=rand(),x2=x*x;if(u<1-0.0331*x2*x2)return d*v;if(Math.log(u)<0.5*x2+d*(1-v+Math.log(v)))return d*v;}
}
function beta(a,b,rand){const x=gammaSample(a,rand),y=gammaSample(b,rand);return x/(x+y);}
function argmax(a){let i=0;for(let j=1;j<a.length;j++)if(a[j]>a[i])i=j;return i;}
class Chart{
  constructor(canvas,opts){this.canvas=canvas;this.opts=Object.assign({xlabel:'',ylabel:'',padding:{l:46,r:14,t:18,b:28},grid:4,yMin:null,yMax:null,xMin:0,xMax:null,shade:null},opts||{});this.series={};}
  line(name,color){this.series[name]={color:color||COLORS.blue,points:[]};return this;}
  push(name,x,y){if(!this.series[name])this.line(name);this.series[name].points.push([x,y]);}
  reset(){for(const k in this.series)this.series[k].points=[];}
  _bounds(){let xM=this.opts.xMax,yM=this.opts.yMax,ym=this.opts.yMin,any=false;for(const k in this.series){const p=this.series[k].points;if(!p.length)continue;any=true;for(const [x,y] of p){if(xM===null||x>xM)xM=x;if(yM===null||y>yM)yM=y;if(ym===null||y<ym)ym=y;}}if(!any)return null;if(xM===null)xM=1;if(yM===null)yM=1;if(ym===null)ym=0;if(yM-ym<1e-6)yM=ym+1;return{xMin:this.opts.xMin,xMax:xM,yMin:ym,yMax:yM};}
  render(){const c=this.canvas,dpr=window.devicePixelRatio||1,W=c.clientWidth,H=c.clientHeight||c.height;c.width=W*dpr;c.height=H*dpr;const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);const p=this.opts.padding,pw=W-p.l-p.r,ph=H-p.t-p.b;
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.font='11px ui-monospace,Menlo,monospace';ctx.fillStyle=COLORS.dim;
    for(let i=0;i<=this.opts.grid;i++){const y=p.t+(i/this.opts.grid)*ph;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+pw,y);ctx.stroke();}
    const b=this._bounds();if(!b){ctx.fillText('— click a restaurant to start —',p.l+8,p.t+ph/2);return;}
    const xPx=x=>p.l+((x-b.xMin)/(b.xMax-b.xMin||1))*pw,yPx=y=>p.t+(1-(y-b.yMin)/(b.yMax-b.yMin||1))*ph;
    ctx.fillText(b.yMax.toFixed(b.yMax>10?0:1),4,p.t+4);ctx.fillText(b.yMin.toFixed(b.yMin>10?0:1),4,p.t+ph+4);
    ctx.fillText(this.opts.xlabel?`${this.opts.xlabel}: ${b.xMax|0}`:`${b.xMax|0}`,W-100,H-6);
    for(const name in this.series){const s=this.series[name];if(s.points.length<2)continue;ctx.strokeStyle=s.color;ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<s.points.length;i++){const [x,y]=s.points[i],px=xPx(x),py=yPx(y);if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.stroke();}
    let lx=W-p.r-8,ly=p.t+12;ctx.textAlign='right';
    for(const name in this.series){const s=this.series[name];ctx.fillStyle=s.color;const last=s.points[s.points.length-1];const lbl=last?`${name}  ${last[1].toFixed(1)}`:name;ctx.fillText(lbl,lx,ly);ly+=14;}ctx.textAlign='left';
  }
}

// ============ Bandit core ============
const K=5;
const RESTAURANTS=[
  {name:'Ramen Den',tag:'fast, cozy, a little salty'},
  {name:'Taco Yard',tag:'bright, cheap, inconsistent'},
  {name:'Biryani House',tag:'slow, fragrant, high upside'},
  {name:'Sushi Bar',tag:'precise, pricey, reliable'},
  {name:'Pasta Corner',tag:'nearby, filling, safe'}
];
const PS=[0.30,0.55,0.40,0.65,0.50];
function newBandit(ps, randSeed){
  const r=rng(randSeed);
  return {ps:ps.slice(),pulls:new Array(K).fill(0),successes:new Array(K).fill(0),cumRegret:0,bestArm:argmax(ps),bestMean:Math.max(...ps),history:[],rng:r};
}
function pull(b,arm){const r=(b.rng()<b.ps[arm])?1:0;b.pulls[arm]+=1;b.successes[arm]+=r;b.cumRegret+=(b.bestMean-b.ps[arm]);b.history.push(b.cumRegret);return r;}
function thompsonPick(b){const s=b.pulls.map((n,i)=>{const a=1+b.successes[i],bb=1+(n-b.successes[i]);return beta(a,bb,b.rng);});return argmax(s);}

// ============ Manual playground ============
(function manual(){
  let ps=PS.slice();
  let b=newBandit(ps,777);
  let bot=newBandit(ps,1777);
  let lastBot='—';
  let revealed=false;
  const armsDiv=document.getElementById('arms');
  const ch=new Chart(document.getElementById('mancanvas'),{xlabel:'pull',ylabel:'regret',xMin:0,yMin:0,padding:{l:40,r:12,t:14,b:22}});
  ch.line('you',COLORS.orange).line('Thompson bot',COLORS.green);
  function render(){
    armsDiv.innerHTML='';
    for(let i=0;i<K;i++){
      const n=b.pulls[i],mean=n?b.successes[i]/n:0,best=(i===b.bestArm)&&revealed,meta=RESTAURANTS[i],col=[COLORS.blue,COLORS.green,COLORS.orange,COLORS.purple,COLORS.red][i];
      const el=document.createElement('div');
      el.className='arm'+(best?' star':'');
      el.innerHTML=`<div class="top"><span class="name">${meta.name}${best?' ★':''}</span><span>${n} visits</span></div>
        <svg class="arm-icon" viewBox="0 0 76 60" aria-hidden="true">
          <rect x="8" y="26" width="60" height="28" rx="6" fill="#17243c" stroke="${col}"></rect>
          <path d="M14 26 L38 8 L62 26" fill="#213250" stroke="${col}"></path>
          <circle cx="38" cy="40" r="9" fill="#0e1626" stroke="${col}" stroke-width="2"></circle>
          <path d="M28 40 H48 M38 31 V49" stroke="${col}" stroke-width="2" stroke-linecap="round"></path>
        </svg>
        <div class="tag">${meta.tag}</div>
        <div class="bar"><div style="width:${(mean*100).toFixed(0)}%;background:${col}"></div></div>
        <div class="mu">liked = ${n?mean.toFixed(3):'—'}</div>
        ${revealed?`<div class="true">true = ${ps[i].toFixed(3)}</div>`:''}`;
      el.style.borderColor=best?COLORS.green:'';
      el.onclick=()=>{
        const t=b.history.length+1;
        pull(b,i);
        const botArm=thompsonPick(bot);
        pull(bot,botArm);
        lastBot=RESTAURANTS[botArm].name;
        ch.push('you',t,b.cumRegret);
        ch.push('Thompson bot',t,bot.cumRegret);
        render();ch.render();
      };
      armsDiv.appendChild(el);
    }
    document.getElementById('mpulls').textContent=b.history.length;
    document.getElementById('mregret').textContent=b.cumRegret.toFixed(2);
    document.getElementById('botregret').textContent=bot.cumRegret.toFixed(2);
    document.getElementById('botpick').textContent=lastBot;
  }
  document.getElementById('reveal').onclick=()=>{revealed=!revealed;document.getElementById('reveal').textContent=revealed?'hide true means':'reveal true means';render();};
  document.getElementById('manreset').onclick=()=>{const seed=Date.now()&0xffff;b=newBandit(ps,seed);bot=newBandit(ps,seed+1009);lastBot='—';revealed=false;document.getElementById('reveal').textContent='reveal true means';ch.reset();ch.line('you',COLORS.orange).line('Thompson bot',COLORS.green);render();ch.render();};
  render(); ch.render();
  window.addEventListener('resize',()=>ch.render());
})();
</script>
<script>
/* report content height to the embedding page so the iframe can auto-size */
(function(){
  if(window.parent===window)return;
  function postHeight(){var h=Math.ceil(document.documentElement.getBoundingClientRect().height);window.parent.postMessage({type:'demo-height',height:h},'*');}
  window.addEventListener('load',function(){postHeight();setTimeout(postHeight,250);setTimeout(postHeight,700);});
  window.addEventListener('resize',postHeight);
  if(window.ResizeObserver){try{new ResizeObserver(postHeight).observe(document.body);}catch(e){}}
})();
</script>
</body>
</html>
