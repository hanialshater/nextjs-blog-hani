<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>10,000 players: find the best 100</title>
<style>
:root{--bg:#0b1220;--card:#131c30;--card2:#1a2440;--fg:#e6edf3;--dim:#8b95a8;--accent:#4c8df6;--good:#5fd2a3;--gold:#f5c451;--border:#1f2a44;--code:#0e1626;--mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",Inter,Roboto,sans-serif}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--fg)}body{padding:12px;font:15px/1.45 var(--sans)}.root{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}.stat{background:var(--code);border:1px solid var(--border);border-radius:8px;padding:8px 10px}.label{font:9.5px var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.08em}.value{font:18px var(--mono);margin-top:3px}.main{display:grid;grid-template-columns:1.3fr 1fr;gap:12px}.panel{min-width:0}.caption{font:10px var(--mono);color:var(--dim);text-align:center;margin-top:4px}.controls{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:12px}button,select{font:12px var(--mono);border:1px solid var(--border);border-radius:6px;padding:7px 10px;background:var(--card2);color:var(--fg);cursor:pointer}button:hover,select:hover{border-color:var(--accent)}button.primary{background:var(--accent);border-color:var(--accent);color:#07101e;font-weight:700}canvas{display:block;width:100%;height:240px;background:var(--code);border:1px solid var(--border);border-radius:8px}.note{font:11px/1.5 var(--mono);color:var(--dim);margin-top:10px}.note b{color:var(--good)}.big{color:var(--gold)}@media(max-width:640px){.main{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="root">
<div class="stats"><div class="stat"><div class="label">players</div><div class="value">10,000</div></div><div class="stat"><div class="label">target</div><div class="value" id="target">top 100</div></div><div class="stat"><div class="label">matches each</div><div class="value" id="matches">0</div></div><div class="stat"><div class="label">adaptive recall</div><div class="value" id="recall">0%</div></div></div>
<div class="main"><div class="panel"><canvas id="race" height="240"></canvas><div class="caption">recall@K at evaluation checkpoints</div></div><div class="panel"><canvas id="scatter" height="240"></canvas><div class="caption">adaptive estimate vs true skill · 600 sampled players</div></div></div>
<div class="controls"><button class="primary" id="play">▶ run matches</button><button id="step">+1,000</button><button id="reset">reset</button><label>find <select id="k"><option value="10">top 10</option><option value="100" selected>top 100</option><option value="500">top 500</option></select></label></div>
<div class="note" id="note">The animation advances in small chunks. Full top-K recall is evaluated every 1,000 matches rather than sorting 10,000 ratings on every frame.</div>
</div>
<script>
const N=10000, COLORS={random:'#8b95a8',adaptive:'#5fd2a3',gold:'#f5c451',dim:'#8b95a8',blue:'#4c8df6'};
let K=100,skill,ratingRandom,ratingAdaptive,gamesRandom,gamesAdaptive,trueTop,cutline,matches=0,hRandom=[],hAdaptive=[],running=false,frame=null,seed=7,nextEval=1000,sample=[];
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function rng(s){return function(){s=(s+0x6D2B79F5)|0;let t=s;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296}}
function normal(rand){const u=Math.max(rand(),1e-12),v=rand();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
function logistic(x){return 1/(1+Math.exp(-x))}
function topK(values,k){const order=Array.from({length:values.length},(_,i)=>i);order.sort((a,b)=>values[b]-values[a]);return order.slice(0,k)}
function reset(){const rand=rng((Date.now()&0xffff)+7);skill=new Float32Array(N);for(let i=0;i<N;i++)skill[i]=normal(rand);const truth=topK(skill,K);trueTop=new Set(truth);cutline=skill[truth[K-1]];ratingRandom=new Float32Array(N);ratingAdaptive=new Float32Array(N);gamesRandom=new Uint16Array(N);gamesAdaptive=new Uint16Array(N);matches=0;hRandom=[];hAdaptive=[];nextEval=1000;running=false;$('play').textContent='▶ run matches';sample=[];for(let i=0;i<600;i++)sample.push((rand()*N)|0);$('target').textContent='top '+K;evaluate(true);draw()}
function pairRandom(rand){const i=(rand()*N)|0;let j=(rand()*N)|0;if(i===j)j=(j+1)%N;return[i,j]}
function pickNearCut(rating,rand){let a=-1,b=-1,da=Infinity,db=Infinity;const cut=estimateCut(rating);for(let n=0;n<48;n++){const i=(rand()*N)|0,d=Math.abs(rating[i]-cut);if(d<da){db=da;b=a;da=d;a=i}else if(d<db){db=d;b=i}}if(b<0||a===b)b=(a+1)%N;return[a,b]}
function estimateCut(rating){const reservoir=[];for(let i=0;i<512;i++)reservoir.push(rating[(i*7919+matches*17)%N]);reservoir.sort((a,b)=>b-a);return reservoir[Math.min(reservoir.length-1,Math.floor(K/N*reservoir.length))]}
function play(rating,games,i,j,rand){const iWon=rand()<logistic(skill[i]-skill[j]);const expected=logistic((rating[i]-rating[j])/2.0);const ki=games[i]<20?.55:games[i]<60?.32:.16;const kj=games[j]<20?.55:games[j]<60?.32:.16;if(iWon){rating[i]+=ki*(1-expected);rating[j]-=kj*(1-expected)}else{rating[i]-=ki*expected;rating[j]+=kj*expected}games[i]++;games[j]++}
function recall(rating){const estimated=topK(rating,K);let hit=0;for(const i of estimated)if(trueTop.has(i))hit++;return hit/K}
function evaluate(force=false){if(!force&&matches<nextEval)return;const rr=recall(ratingRandom),ra=recall(ratingAdaptive);hRandom.push([matches,rr]);hAdaptive.push([matches,ra]);nextEval=matches+1000;$('matches').textContent=matches.toLocaleString();$('recall').textContent=Math.round(ra*100)+'%';$('note').innerHTML=`After <b>${matches.toLocaleString()}</b> matches each: adaptive recall@${K} = <b>${Math.round(ra*100)}%</b>; random = ${Math.round(rr*100)}%. All pairs would be <span class="big">${(N*(N-1)/2/1e6).toFixed(1)} million</span> comparisons.`}
function advance(count){const rr=rng(1009+matches*3),ar=rng(9001+matches*5);for(let t=0;t<count;t++){let[i,j]=pairRandom(rr);play(ratingRandom,gamesRandom,i,j,rr);[i,j]=pickNearCut(ratingAdaptive,ar);play(ratingAdaptive,gamesAdaptive,i,j,ar);matches++}evaluate(false)}
function loop(){if(!running)return;advance(120);draw();frame=requestAnimationFrame(loop)}
function draw(){drawRace();drawScatter()}
function prep(c){const dpr=devicePixelRatio||1,w=c.clientWidth||400,h=240;c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.setTransform(dpr,0,0,dpr,0,0);x.clearRect(0,0,w,h);return{x,w,h}}
function drawRace(){const{x,w,h}=prep($('race')),p={l:34,r:12,t:14,b:22},pw=w-p.l-p.r,ph=h-p.t-p.b;x.strokeStyle='rgba(255,255,255,.07)';x.fillStyle=COLORS.dim;x.font='10px ui-monospace,monospace';for(let v=0;v<=1;v+=.25){const y=p.t+(1-v)*ph;x.beginPath();x.moveTo(p.l,y);x.lineTo(p.l+pw,y);x.stroke();x.fillText(Math.round(v*100)+'%',5,y+3)}const xmax=Math.max(matches,1000);function line(hist,color){if(hist.length<2)return;x.strokeStyle=color;x.lineWidth=2;x.beginPath();hist.forEach(([m,r],i)=>{const px=p.l+m/xmax*pw,py=p.t+(1-r)*ph;i?x.lineTo(px,py):x.moveTo(px,py)});x.stroke()}line(hRandom,COLORS.random);line(hAdaptive,COLORS.adaptive);x.textAlign='right';x.fillStyle=COLORS.adaptive;x.fillText('adaptive',w-p.r,h? p.t+11:0);x.fillStyle=COLORS.random;x.fillText('random',w-p.r,p.t+24);x.textAlign='left';x.fillStyle=COLORS.dim;x.fillText('matches: '+matches.toLocaleString(),p.l+2,h-6)}
function drawScatter(){const{x,w,h}=prep($('scatter')),p={l:30,r:10,t:12,b:20},pw=w-p.l-p.r,ph=h-p.t-p.b;let smin=Infinity,smax=-Infinity,rmin=Infinity,rmax=-Infinity;for(const i of sample){const s=skill[i],r=ratingAdaptive[i];if(s<smin)smin=s;if(s>smax)smax=s;if(r<rmin)rmin=r;if(r>rmax)rmax=r}if(rmax-rmin<1e-5)rmax=rmin+1;const xx=v=>p.l+(v-smin)/(smax-smin||1)*pw,yy=v=>p.t+(1-(v-rmin)/(rmax-rmin))*ph;x.strokeStyle='rgba(255,255,255,.07)';x.strokeRect(p.l,p.t,pw,ph);x.strokeStyle='rgba(245,196,81,.55)';x.setLineDash([4,3]);x.beginPath();x.moveTo(xx(cutline),p.t);x.lineTo(xx(cutline),p.t+ph);x.stroke();x.setLineDash([]);for(const i of sample){x.fillStyle=trueTop.has(i)?COLORS.gold:'rgba(76,141,246,.45)';x.beginPath();x.arc(xx(skill[i]),yy(ratingAdaptive[i]),trueTop.has(i)?2.2:1.3,0,Math.PI*2);x.fill()}x.fillStyle=COLORS.gold;x.font='10px ui-monospace,monospace';x.fillText('true top-'+K+' cut',xx(cutline)+3,p.t+10)}
$('play').onclick=()=>{running=!running;$('play').textContent=running?'⏸ pause':'▶ run matches';if(running)loop()};$('step').onclick=()=>{running=false;$('play').textContent='▶ run matches';advance(1000);draw()};$('reset').onclick=reset;$('k').onchange=e=>{K=Number(e.target.value);reset()};addEventListener('resize',draw);reset();
(function(){function h(){parent.postMessage({type:'demo-height',height:Math.ceil(document.documentElement.getBoundingClientRect().height)},'*')}addEventListener('load',()=>{h();setTimeout(h,250)});addEventListener('resize',h);if(window.ResizeObserver)new ResizeObserver(h).observe(document.body)})();
</script>
</body>
</html>
